    </div>
  );

  return (
    <div style={{display:"flex",flexDirection:"column",gap:3}}>
      <div style={{display:"flex",alignItems:"center",gap:4}}>
        {waived ? (
          <>
            <span style={{textDecoration:"line-through",color:"#bbb",fontSize:12,fontWeight:500}}>{displayFee}</span>
            <span style={{background:"#e6f4ea",color:"#2e7d32",borderRadius:5,padding:"1px 6px",fontSize:10,fontWeight:700}}>WAIVED</span>
          </>
        ) : (
          <span style={{background:"#fce8e6",color:"#c62828",fontWeight:700,fontSize:13}}>{displayFee}</span>
        )}
        <button onClick={() => { setEditVal(String(displayFee)); setEditing(true); }}
          style={{background:"none",border:"none",cursor:"pointer",color:"#aaa",fontSize:12,padding:"0 2px"}} title="Edit fee">✏️</button>
      </div>
      <div style={{fontSize:10,color:"#999"}}>{mins}min · {blocks} block{blocks>1?"s":""}</div>
      {!waived ? (
        <button onClick={() => onUpdate({ feeWaived: true })}
          style={{background:"#e6f4ea",color:"#2e7d32",border:"none",borderRadius:5,padding:"2px 8px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
          Waive
        </button>
      ) : (
        <button onClick={() => onUpdate({ feeWaived: false })}
          style={{background:"#fce8e6",color:"#c62828",border:"none",borderRadius:5,padding:"2px 8px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
          Reinstate
        </button>
      )}
    </div>
  );
}

function AttendanceModule({ children, allChildren, attendance, setAttendance, setEmailModal, showNotification, settings, globalFilters }) {
  const today = "2026-03-03";
  const [date, setDate]       = useState(today);
  const [viewMode, setViewMode] = useState("daily");

  // Sync date from global filter
  useEffect(() => {
    if (globalFilters?.dateFrom) setDate(globalFilters.dateFrom);
  }, [globalFilters?.dateFrom]); // "daily" | "weekly"
  const [absentModal, setAbsentModal] = useState(false);
  const [notified, setNotified] = useState({});

  // Sync date from global filter (dateFrom)
  useEffect(() => {
    if (globalFilters?.dateFrom) setDate(globalFilters.dateFrom);
  }, [globalFilters?.dateFrom]);

  // Active filter banner text
  const filterDesc = [];
  if (globalFilters?.room) filterDesc.push(`Room: ${globalFilters.room}`);
  if (globalFilters?.childId) { const c = (allChildren||[]).find(x=>x.id===globalFilters.childId); if(c) filterDesc.push(`Child: ${c.name}`); }
  if (globalFilters?.dateFrom) filterDesc.push(`From: ${globalFilters.dateFrom}${globalFilters.dateTo?` → ${globalFilters.dateTo}`:""}`);

  const getDefaultDayAtt = () => children.map(c => ({ childId: c.id, checkIn: null, checkOut: null, lateCheckOut: null, present: false }));
  const dayAtt = attendance[date] || getDefaultDayAtt();
  const now = () => new Date().toTimeString().slice(0, 5);
  const setDayAtt = (updated) => setAttendance({ ...attendance, [date]: updated });

  const checkIn = (childId) => {
    const base = dayAtt.length ? dayAtt : getDefaultDayAtt();
    const updated = base.map(a => a.childId === childId ? { ...a, present: true, checkIn: now(), checkOut: null, lateCheckOut: null } : a);
    setDayAtt(updated); showNotification("Checked in");
  };
  const checkOut = (childId) => {
    const updated = dayAtt.map(a => a.childId === childId ? { ...a, present: false, checkOut: now() } : a);
    setDayAtt(updated); showNotification("Checked out");
  };
  const markLateCheckout = (childId, lateTime) => {
    const updated = dayAtt.map(a => a.childId === childId ? { ...a, lateCheckOut: lateTime } : a);
    setDayAtt(updated); showNotification("Late pickup recorded");
  };
  const markAbsent = (childId) => {
    const base = dayAtt.length ? dayAtt : getDefaultDayAtt();
    const updated = base.map(a => a.childId === childId ? { ...a, present: false, checkIn: null, checkOut: null } : a);
    setDayAtt(updated);
  };

  const calcDuration = (inTime, outTime) => {
    if (!inTime || !outTime) return null;
    const [sh, sm] = inTime.split(":").map(Number);
    const [eh, em] = outTime.split(":").map(Number);
    const mins = (eh * 60 + em) - (sh * 60 + sm);
    if (mins <= 0) return null;
    return { mins, label: mins >= 60 ? `${Math.floor(mins/60)}h ${mins%60}m` : `${mins}m` };
  };

  // Late pickup: minutes past scheduled close (default 18:00), billed per 15-min block
  const CLOSE_TIME = settings.closeTime || "18:00";
  const calcLateFee = (lateCheckOut, child) => {
    if (!lateCheckOut) return null;
    const [ch, cm] = CLOSE_TIME.split(":").map(Number);
    const [lh, lm] = lateCheckOut.split(":").map(Number);
    const lateMins = (lh * 60 + lm) - (ch * 60 + cm);
    if (lateMins <= 0) return null;
    const blocks = Math.ceil(lateMins / 15);
    const rate = child?.lateFee || settings.latePickupFee || 10;
    return { mins: lateMins, blocks, fee: blocks * rate, label: `${lateMins}m late · ${blocks}x $${rate} = $${blocks * rate}` };
  };

  const absentChildren = children.filter(c => {
    const att = dayAtt.find(a => a.childId === c.id);
    return !att?.present && !att?.checkOut;
  });
  const sendOne = (child) => { setEmailModal({ child, to: child.email, ...emailTemplates.absence_followup(child.name, child.parent, settings.centerName) }); setNotified(prev => ({ ...prev, [child.id]: true })); };
  const sendAll = () => { absentChildren.forEach(c => setNotified(prev => ({ ...prev, [c.id]: true }))); showNotification(`${absentChildren.length} absence notifications sent`); setAbsentModal(false); };

  const presentCount    = dayAtt.filter(a => a.present).length;
  const checkedOutCount = dayAtt.filter(a => !a.present && a.checkOut).length;
  const lateCount       = dayAtt.filter(a => { const c = children.find(ch => ch.id === a.childId); return calcLateFee(a.lateCheckOut, c); }).length;

  // Weekly view helpers
  const getWeekDates = (anchor) => {
    const d = new Date(anchor + "T12:00:00");
    const day = d.getDay(); // 0=Sun
    const mon = new Date(d); mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
    return Array.from({length:5}, (_, i) => { const dd = new Date(mon); dd.setDate(mon.getDate()+i); return dd.toISOString().split("T")[0]; });
  };
  const weekDates = getWeekDates(date);

  const getStatus = (att) => { if (att?.present) return "present"; if (att?.checkOut) return "checkedout"; return "absent"; };
  const statusMap = { present: ["#e6f4ea","#2e7d32","Present"], checkedout: ["#e8f0fe","#1a73e8","Checked Out"], absent: ["#fce8e6","#c62828","Absent"] };

  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f1f3d"}}>Attendance</h1>
          <p style={{margin:"4px 0 0",color:"#888",fontSize:13}}>Check children in/out · Late pickup tracking</p>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {/* View toggle */}
          <div style={{background:"#fff",borderRadius:8,padding:3,display:"flex",gap:2,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            {[["daily","Daily"],["weekly","Weekly"]].map(([id,label])=>(
              <button key={id} onClick={()=>setViewMode(id)} style={{padding:"5px 14px",borderRadius:6,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12.5,fontWeight:500,background:viewMode===id?"#0f1f3d":"transparent",color:viewMode===id?"#fff":"#666"}}>{label}</button>
            ))}
          </div>
          <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{border:"1.5px solid #dde3ec",borderRadius:8,padding:"7px 12px",fontFamily:"inherit",fontSize:13}}/>
          <button onClick={()=>{ if(absentChildren.length===0){showNotification("All children accounted for!");}else{setAbsentModal(true);}}} style={{display:"flex",alignItems:"center",gap:7,background:absentChildren.length>0?"#fff3e0":"#f4f7fc",color:absentChildren.length>0?"#e65100":"#aaa",border:`1.5px solid ${absentChildren.length>0?"#ffcc80":"#dde3ec"}`,borderRadius:8,padding:"7px 14px",fontFamily:"inherit",fontSize:13,fontWeight:500,cursor:"pointer"}}>
            📧 Notify Absent {absentChildren.length>0&&<span style={{background:"#e65100",color:"#fff",borderRadius:20,padding:"1px 7px",fontSize:11,fontWeight:700}}>{absentChildren.length}</span>}
          </button>
        </div>
      </div>

      {/* Summary pills */}
      <div style={{display:"flex",gap:12,marginBottom:18}}>
        {[["Checked In",presentCount,"#0f9d58","#e6f4ea"],["Checked Out",checkedOutCount,"#1a73e8","#e8f0fe"],["Absent",absentChildren.length,"#e53935","#fce8e6"],["Late Pickups",lateCount,"#7b1fa2","#f3e5f5"],["Total",children.length,"#555","#f4f7fc"]].map(([l,v,c,bg])=>(
          <div key={l} style={{background:bg,borderRadius:10,padding:"10px 18px",minWidth:80}}>
            <div style={{color:c,fontWeight:700,fontSize:20}}>{v}</div>
            <div style={{color:c,fontSize:11,fontWeight:500}}>{l}</div>
          </div>
        ))}
      </div>

      {/* ── Daily View ── */}
      {viewMode==="daily" && (
        <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead>
              <tr style={{background:"#f8fafd"}}>
                {["Child","Room","Status","Check-In","Check-Out","Duration","Late Checkout","Late Fee","Actions"].map(h=>(
                  <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.4px",whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {children.map(c => {
                const att = dayAtt.find(a => a.childId === c.id) || {};
                const status = getStatus(att);
                const [sbg, sc, slabel] = statusMap[status];
                const dur = calcDuration(att.checkIn, att.checkOut || (att.present ? now() : null));
                const late = calcLateFee(att.lateCheckOut, c);
                return (
                  <tr key={c.id} style={{borderTop:"1px solid #f2f4f8"}}>
                    <td style={{padding:"11px 14px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Avatar name={c.name} size={30}/>
                        <div><div style={{fontWeight:500,fontSize:13.5}}>{c.name}</div><div style={{color:"#999",fontSize:11}}>{c.parent}</div></div>
                      </div>
                    </td>
                    <td style={{padding:"11px 14px",fontSize:13,color:"#555"}}>{c.room}</td>
                    <td style={{padding:"11px 14px"}}><span style={{background:sbg,color:sc,borderRadius:6,padding:"3px 9px",fontSize:11.5,fontWeight:600}}>{slabel}</span></td>
                    <td style={{padding:"11px 14px",fontSize:13,fontWeight:att.checkIn?500:400,color:att.checkIn?"#333":"#bbb"}}>{att.checkIn||"—"}</td>
                    <td style={{padding:"11px 14px",fontSize:13,color:att.checkOut?"#1a73e8":att.present?"#0f9d58":"#bbb",fontWeight:att.checkOut?500:400}}>
                      {att.checkOut||att.present?<span style={{color:att.present?"#0f9d58":"#1a73e8"}}>{att.checkOut||"Still here"}</span>:"—"}
                    </td>
                    <td style={{padding:"11px 14px",fontSize:13,color:"#888"}}>{dur?.label||"—"}</td>
                    {/* Late checkout column */}
                    <td style={{padding:"11px 14px"}}>
                      {att.checkOut ? (
                        att.lateCheckOut ? (
                          <span style={{background:"#fce8e6",color:"#c62828",borderRadius:6,padding:"3px 9px",fontSize:12,fontWeight:600}}>{att.lateCheckOut}</span>
                        ) : (
                          <input type="time" placeholder="HH:MM" onChange={e=>{ if(e.target.value) markLateCheckout(c.id, e.target.value); }} style={{border:"1.5px solid #dde3ec",borderRadius:6,padding:"4px 8px",fontFamily:"inherit",fontSize:12,width:90,color:"#555"}}/>
                        )
                      ) : <span style={{color:"#ccc",fontSize:12}}>—</span>}
                    </td>
                    {/* Late fee column — editable + waiveable */}
                    <td style={{padding:"11px 14px",minWidth:130}}>
                      {late ? (
                        <LateFeeCell
                          fee={late.fee}
                          mins={late.mins}
                          blocks={late.blocks}
                          waived={att.feeWaived}
                          customFee={att.customFee}
                          onUpdate={(updates) => {
                            const updated = dayAtt.map(a => a.childId === c.id ? {...a, ...updates} : a);
                            setDayAtt(updated);
                          }}
                        />
                      ) : <span style={{color:"#ccc",fontSize:12}}>—</span>}
                    </td>
                    <td style={{padding:"11px 14px"}}>
                      <div style={{display:"flex",gap:5}}>
                        {!att.present&&!att.checkOut&&<button onClick={()=>checkIn(c.id)} style={{background:"#e6f4ea",color:"#2e7d32",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>✓ In</button>}
                        {att.present&&!att.checkOut&&<button onClick={()=>checkOut(c.id)} style={{background:"#e8f0fe",color:"#1a73e8",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>↩ Out</button>}
                        {att.present&&<button onClick={()=>markAbsent(c.id)} style={{background:"#fce8e6",color:"#c62828",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>✕</button>}
                        {!att.present&&att.checkOut&&<button onClick={()=>checkIn(c.id)} style={{background:"#f0f4f8",color:"#555",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>Re-In</button>}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* ── Weekly View ── */}
      {viewMode==="weekly" && (
        <div>
          <div style={{fontWeight:600,fontSize:14,color:"#0f1f3d",marginBottom:14}}>
            Week of {weekDates[0]} — {weekDates[4]}
          </div>
          <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{background:"#f8fafd"}}>
                  <th style={{padding:"11px 16px",textAlign:"left",fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",minWidth:140}}>Child</th>
                  {weekDates.map(d => {
                    const dayName = new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"});
                    const isToday = d === today;
                    return (
                      <th key={d} style={{padding:"11px 12px",textAlign:"center",fontSize:11,fontWeight:600,color:isToday?"#1a73e8":"#888",background:isToday?"#f0f7ff":"transparent",textTransform:"uppercase",minWidth:110}}>
                        {dayName}<br/><span style={{fontSize:10,fontWeight:400}}>{d.slice(5)}</span>
                      </th>
                    );
                  })}
                  <th style={{padding:"11px 12px",textAlign:"center",fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase"}}>Days In</th>
                  <th style={{padding:"11px 12px",textAlign:"center",fontSize:11,fontWeight:600,color:"#c62828",textTransform:"uppercase"}}>Late Fees</th>
                </tr>
              </thead>
              <tbody>
                {children.map(c => {
                  let daysIn = 0; let totalLateFee = 0;
                  return (
                    <tr key={c.id} style={{borderTop:"1px solid #f2f4f8"}}>
                      <td style={{padding:"11px 16px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <Avatar name={c.name} size={28}/>
                          <div style={{fontWeight:500,fontSize:13}}>{c.name}</div>
                        </div>
                      </td>
                      {weekDates.map(d => {
                        const dayRec = attendance[d] || [];
                        const att = dayRec.find(a => a.childId === c.id) || {};
                        const st = getStatus(att);
                        const [sbg,sc] = statusMap[st];
                        const late = calcLateFee(att.lateCheckOut, c);
                        if (st !== "absent") daysIn++;
                        if (late) totalLateFee += late.fee;
                        const isToday = d === today;
                        return (
                          <td key={d} style={{padding:"8px 12px",textAlign:"center",background:isToday?"#f8fcff":"transparent"}}>
                            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                              <span style={{background:sbg,color:sc,borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>
                                {st==="present"?"In":st==="checkedout"?"✓ Out":"—"}
                              </span>
                              {att.checkIn&&<span style={{fontSize:10,color:"#888"}}>{att.checkIn}</span>}
                              {att.checkOut&&<span style={{fontSize:10,color:"#1a73e8"}}>{att.checkOut}</span>}
                              {late&&<span style={{fontSize:10,color:"#c62828",fontWeight:600}}>${late.fee} late</span>}
                            </div>
                          </td>
                        );
                      })}
                      <td style={{padding:"11px 12px",textAlign:"center",fontWeight:700,fontSize:14,color:"#0f9d58"}}>{daysIn}/5</td>
                      <td style={{padding:"11px 12px",textAlign:"center",fontWeight:700,fontSize:14,color:totalLateFee>0?"#c62828":"#bbb"}}>{totalLateFee>0?`$${totalLateFee}`:"—"}</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Absent Notification Modal */}
      {absentModal && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:14,width:560,maxHeight:"80vh",overflowY:"auto",padding:28,boxShadow:"0 20px 60px rgba(0,0,0,0.18)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{fontWeight:700,fontSize:17,color:"#0f1f3d"}}>📧 Notify Absent Families</div>
              <button onClick={()=>setAbsentModal(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#888"}}>×</button>
            </div>
            <p style={{margin:"0 0 20px",color:"#888",fontSize:13}}>{absentChildren.length} {absentChildren.length===1?"child is":"children are"} absent today.</p>
            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
              {absentChildren.map(child => {
                const tmpl = emailTemplates.absence_followup(child.name, child.parent, settings.centerName);
                const done = notified[child.id];
                return (
                  <div key={child.id} style={{border:`1.5px solid ${done?"#c8e6c9":"#eaeef4"}`,borderRadius:10,padding:"12px 14px",background:done?"#f1f8f1":"#fff"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Avatar name={child.name} size={32}/>
                        <div><div style={{fontWeight:600,fontSize:13}}>{child.name}</div><div style={{fontSize:11,color:"#888"}}>{child.email}</div></div>
                      </div>
                      {done?<span style={{background:"#e6f4ea",color:"#2e7d32",borderRadius:6,padding:"3px 9px",fontSize:11,fontWeight:600}}>✓ Sent</span>
                           :<button onClick={()=>sendOne(child)} style={{background:"#e8f0fe",color:"#1a73e8",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>Send</button>}
                    </div>
                    <div style={{background:"#f8fafd",borderRadius:7,padding:"8px 10px",fontSize:11.5,color:"#666"}}>
                      <div style={{fontWeight:600,color:"#333",marginBottom:2}}>Subject: {tmpl.subject}</div>
                      <div style={{color:"#777"}}>{tmpl.body?.slice(0,120)}...</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",paddingTop:14,borderTop:"1px solid #f0f2f5"}}>
              <div style={{fontSize:12,color:"#888"}}>{Object.keys(notified).length} of {absentChildren.length} sent</div>
              <div style={{display:"flex",gap:8}}>
                <Btn label="Close" onClick={()=>setAbsentModal(false)} secondary/>
                <Btn label={`📤 Send All ${absentChildren.length}`} onClick={sendAll}/>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ─── Staff ────────────────────────────────────────────────────────────────────

function AddShiftBtn({ staffId, staffName, day, schedules, setSchedules, roomNames, showNotification }) {
  const [open, setOpen] = useState(false);
  const [start, setStart] = useState("08:00");
  const [end, setEnd]     = useState("16:00");
  const [room, setRoom]   = useState(roomNames[0]||"");

  const save = () => {
    if (!start || !end) return;
    setSchedules(prev => [...(prev||[]), { id: Date.now(), staffId, staffName, day, start, end, room }]);
    showNotification(`Shift added for ${staffName}`);
    setOpen(false);
  };

  if (!open) return (
    <button onClick={()=>setOpen(true)} style={{background:"#f0f7ff",color:"#1a73e8",border:"1.5px solid #c8dff7",borderRadius:7,padding:"5px 11px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>+ Shift</button>
  );
  return (
    <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
      <input type="time" value={start} onChange={e=>setStart(e.target.value)} style={{border:"1.5px solid #e0e0e0",borderRadius:6,padding:"4px 6px",fontFamily:"inherit",fontSize:12,width:90}}/>
      <span style={{fontSize:12,color:"#888"}}>to</span>
      <input type="time" value={end} onChange={e=>setEnd(e.target.value)} style={{border:"1.5px solid #e0e0e0",borderRadius:6,padding:"4px 6px",fontFamily:"inherit",fontSize:12,width:90}}/>
      <select value={room} onChange={e=>setRoom(e.target.value)} style={{border:"1.5px solid #e0e0e0",borderRadius:6,padding:"4px 6px",fontFamily:"inherit",fontSize:12}}>
        {["All",...roomNames].map(r=><option key={r}>{r}</option>)}
      </select>
      <button onClick={save} style={{background:"#0f1f3d",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
      <button onClick={()=>setOpen(false)} style={{background:"#f0f4f8",color:"#555",border:"none",borderRadius:6,padding:"4px 8px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
    </div>
  );
}

function StaffModule({ staff, allStaff, setStaff, showNotification, roomNames, rooms, schedules, setSchedules, children, attendance, globalFilters }) {
  const blankForm = { name:"", role:"Assistant Teacher", rooms:[], email:"", phone:"", certifications:"" };
  const [adding, setAdding]     = useState(false);
  const [editing, setEditing]   = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [form, setForm]         = useState(blankForm);

  const toggleRoom = (roomName) => {
    setForm(f => ({
      ...f,
      rooms: f.rooms.includes(roomName) ? f.rooms.filter(r => r !== roomName) : [...f.rooms, roomName]
    }));
  };

  const openAdd  = () => { setForm(blankForm); setAdding(true); setEditing(null); };
  const openEdit = (s) => {
    setForm({ name:s.name, role:s.role, rooms: s.rooms || (s.room ? [s.room] : []), email:s.email, phone:s.phone||"", certifications:s.certifications||"" });
    setEditing(s); setAdding(false);
  };

  const saveAdd = () => {
    if (!form.name.trim()) return;
    const primaryRoom = form.rooms[0] || roomNames[0] || "";
    setStaff([...staff, { ...form, id:Date.now(), status:"active", room:primaryRoom, startDate:new Date().toISOString().split("T")[0] }]);
    setAdding(false); showNotification(`${form.name} added`);
  };

  const saveEdit = () => {
    const primaryRoom = form.rooms[0] || editing.room;
    setStaff(staff.map(s => s.id===editing.id ? { ...s, ...form, room:primaryRoom } : s));
    setEditing(null); showNotification(`${form.name} updated`);
  };

  const confirmAndDelete = () => {
    setStaff(staff.filter(s => s.id !== confirmDelete.id));
    showNotification(`${confirmDelete.name} removed`); setConfirmDelete(null);
  };


  // ── Staff tabs ────────────────────────────────────────────────────
  const [staffTab, setStaffTab] = useState("roster");
  const [schedDay, setSchedDay] = useState("Mon");
  const DAYS = ["Mon","Tue","Wed","Thu","Fri"];

  // Ratio compliance — Texas DFPS rules
  const today = "2026-03-03";
  const todayAtt = (attendance||{})[today] || [];
  const presentChildIds = todayAtt.filter(a=>a.present).map(a=>a.childId);

  const getRatioStatus = (room) => {
    const ratio = TX_RATIOS[room.name];
    if (!ratio) return null;
    const presentInRoom = children.filter(c=>c.room===room.name && presentChildIds.includes(c.id)).length;
    // Staff scheduled today for this room
    const todayDayName = new Date(today+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"}).slice(0,3);
    const staffInRoom = (schedules||[]).filter(s=>s.day===todayDayName && (s.room===room.name||s.room==="All")).length;
    const maxChildren = staffInRoom * ratio.max;
    const pct = maxChildren > 0 ? (presentInRoom / maxChildren) : presentInRoom > 0 ? 2 : 0;
    const over = presentInRoom > maxChildren;
    return { presentInRoom, staffInRoom, maxChildren, pct, over, ratio: ratio.max, label: ratio.label };
  };

  const RoomPicker = () => (
    <div>
      <label style={{fontSize:12,color:"#666",display:"block",marginBottom:6}}>Assigned Rooms <span style={{color:"#999",fontWeight:400}}>(select all that apply)</span></label>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        {roomNames.map(r => {
          const selected = form.rooms.includes(r);
          const room = rooms.find(rm => rm.name === r);
          return (
            <button key={r} type="button" onClick={()=>toggleRoom(r)} style={{padding:"6px 14px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontFamily:"inherit",fontSize:12.5,fontWeight:500,background:selected?(room?.color||"#1a73e8"):"#fff",color:selected?"#fff":"#555",borderColor:selected?(room?.color||"#1a73e8"):"#dde3ec"}}>
              {selected?"✓ ":""}{r}
            </button>
          );
        })}
      </div>
      {form.rooms.length===0&&<div style={{fontSize:11,color:"#f57c00",marginTop:4}}>⚠️ Select at least one room</div>}
    </div>
  );

  const FormFields = () => (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {[["Full Name","name","text"],["Email","email","email"],["Phone","phone","text"],["Certifications","certifications","text"]].map(([label,key,type])=>(
          <div key={key}>
            <label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>{label}</label>
            <input type={type} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/>
          </div>
        ))}
        <div>
          <label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Role</label>
          <select value={form.role} onChange={e=>setForm({...form,role:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}>
            {staffRoles.map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
      </div>
      <RoomPicker/>
    </div>
  );

  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      {(globalFilters?.room || globalFilters?.staffId) && (
        <div style={{background:"#e8f0fe",border:"1.5px solid #c8dff7",borderRadius:10,padding:"8px 16px",marginBottom:14,fontSize:12.5,color:"#1a73e8",display:"flex",gap:8,alignItems:"center"}}>
          <span>🔍</span>
          <span>Showing <strong>{staff.length}</strong> of {(allStaff||staff).length} staff
            {globalFilters?.room && <span> · Room: <strong>{globalFilters.room}</strong></span>}
          </span>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}>
        <div><h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f1f3d"}}>Staff</h1><p style={{margin:"4px 0 0",color:"#888",fontSize:13}}>{staff.length} members · schedules · ratio alerts</p></div>
        <div style={{display:"flex",gap:8}}>
          {staffTab==="roster"&&<Btn label="+ Add Staff" onClick={openAdd}/>}
        </div>
      </div>

      {/* Ratio compliance banner */}
      {(() => {
        const violations = rooms.map(r=>getRatioStatus(r)).filter(s=>s&&s.over);
        if (!violations.length) return null;
        return (
          <div style={{background:"#fce8e6",border:"1.5px solid #ef9a9a",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20}}>🚨</span>
            <div>
              <div style={{fontWeight:700,fontSize:13,color:"#c62828"}}>Ratio Violation — Immediate Action Required</div>
              <div style={{fontSize:12,color:"#c62828"}}>
                {violations.map(v=>`Over ratio in a room (${v.presentInRoom} children, ${v.staffInRoom} staff, max ${v.ratio}:1)`).join(" · ")}
              </div>
            </div>
          </div>
        );
      })()}

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,background:"#fff",borderRadius:10,padding:4,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",width:"fit-content"}}>
        {[["roster","Roster"],["schedule","Schedule"],["ratios","Ratio Compliance"]].map(([id,label])=>(
          <button key={id} onClick={()=>setStaffTab(id)} style={{padding:"7px 18px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:500,background:staffTab===id?"#0f1f3d":"transparent",color:staffTab===id?"#fff":"#666"}}>{label}</button>
        ))}
      </div>

      {/* ── Roster tab ── */}
      {staffTab==="roster" && <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:14}}>
        {staff.map(s => {
          const assignedRooms = s.rooms || (s.room ? [s.room] : []);
          return (
            <div key={s.id} style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",gap:14}}>
              <Avatar name={s.name} size={48} colorIndex={s.id}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:14.5,marginBottom:2}}>{s.name}</div>
                <div style={{color:"#1a73e8",fontSize:12,fontWeight:500,marginBottom:6}}>{s.role}</div>
                {/* Room badges */}
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
                  {assignedRooms.map(r => {
                    const rm = rooms.find(x=>x.name===r);
                    return <span key={r} style={{background:(rm?.color||"#1a73e8")+"22",color:rm?.color||"#1a73e8",borderRadius:5,padding:"2px 9px",fontSize:11,fontWeight:600}}>{r}</span>;
                  })}
                  {assignedRooms.length===0&&<span style={{color:"#bbb",fontSize:12}}>No room assigned</span>}
                </div>
                <div style={{fontSize:12,color:"#666",marginBottom:2}}>📧 {s.email}</div>
                <div style={{fontSize:12,color:"#666",marginBottom:4}}>📞 {s.phone}</div>
                <div style={{fontSize:11,color:"#888"}}>🏅 {s.certifications}</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
                <StatusPill status="active"/>
                <button onClick={()=>openEdit(s)} style={{background:"#e8f0fe",color:"#1a73e8",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11.5,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>Edit</button>
                <button onClick={()=>setConfirmDelete(s)} style={{background:"#fce8e6",color:"#c62828",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11.5,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>Delete</button>
              </div>
            </div>
          );
        })}
      </div>}

      {adding && <Modal title="Add Staff Member" onClose={()=>setAdding(false)} wide><FormFields/><div style={{marginTop:16,display:"flex",justifyContent:"flex-end",gap:8}}><Btn label="Cancel" onClick={()=>setAdding(false)} secondary/><Btn label="Add Staff Member" onClick={saveAdd}/></div></Modal>}
      {editing && <Modal title={`Edit — ${editing.name}`} onClose={()=>setEditing(null)} wide><FormFields/><div style={{marginTop:16,display:"flex",justifyContent:"flex-end",gap:8}}><Btn label="Cancel" onClick={()=>setEditing(null)} secondary/><Btn label="Save Changes" onClick={saveEdit}/></div></Modal>}

      {/* ── Schedule tab ── */}
      {staffTab==="schedule" && (
        <div>
          <div style={{display:"flex",gap:6,marginBottom:18}}>
            {DAYS.map(d=>(
              <button key={d} onClick={()=>setSchedDay(d)} style={{padding:"6px 18px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:500,background:schedDay===d?"#0f1f3d":"#fff",color:schedDay===d?"#fff":"#555",borderColor:schedDay===d?"#0f1f3d":"#dde3ec"}}>{d}</button>
            ))}
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {staff.map(s => {
              const shifts = (schedules||[]).filter(sh=>sh.staffId===s.id && sh.day===schedDay);
              return (
                <div key={s.id} style={{background:"#fff",borderRadius:12,padding:"14px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",alignItems:"center",gap:14}}>
                  <Avatar name={s.name} size={38} colorIndex={s.id}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13.5}}>{s.name}</div>
                    <div style={{fontSize:12,color:"#1a73e8"}}>{s.role}</div>
                  </div>
                  <div style={{flex:2}}>
                    {shifts.length===0 ? (
                      <span style={{color:"#bbb",fontSize:12,fontStyle:"italic"}}>Not scheduled {schedDay}</span>
                    ) : shifts.map(sh=>(
                      <div key={sh.id} style={{display:"inline-flex",alignItems:"center",gap:6,background:"#e8f0fe",borderRadius:8,padding:"5px 12px",marginRight:6}}>
                        <span style={{fontWeight:600,fontSize:13,color:"#1a73e8"}}>{sh.start}–{sh.end}</span>
                        <span style={{fontSize:11,color:"#888"}}>{sh.room}</span>
                        <button onClick={()=>setSchedules(prev=>prev.filter(x=>x.id!==sh.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#c62828",fontSize:14,padding:"0 2px",lineHeight:1}}>×</button>
                      </div>
                    ))}
                  </div>
                  <AddShiftBtn staffId={s.id} staffName={s.name} day={schedDay} schedules={schedules} setSchedules={setSchedules} roomNames={roomNames} showNotification={showNotification}/>
                </div>
              );
            })}
          </div>
          <div style={{background:"#f8fafd",borderRadius:10,padding:"12px 16px",marginTop:16,fontSize:12,color:"#888"}}>
            Tip: Click "+ Shift" to add a shift for any staff member. Shifts appear in ratio calculations.
          </div>
        </div>
      )}

      {/* ── Ratio Compliance tab ── */}
      {staffTab==="ratios" && (
        <div>
          <div style={{background:"#fff8e1",border:"1.5px solid #ffe082",borderRadius:10,padding:"12px 16px",marginBottom:18,fontSize:13,color:"#5d4037"}}>
            📋 <strong>Texas DFPS Minimum Standards:</strong> Butterfly (infant/toddler) 1:4 · Sunflower (toddler) 1:9 · Rainbow (preschool) 1:15. Ratios are calculated using today's present children vs. scheduled staff.
          </div>
          <div className="grid-3col" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:16,marginBottom:24}}>
            {rooms.map(room=>{
              const s = getRatioStatus(room);
              if (!s) return null;
              const barColor = s.over?"#e53935":s.pct>0.8?"#f57c00":"#0f9d58";
              const bgColor = s.over?"#fce8e6":s.pct>0.8?"#fff3e0":"#e6f4ea";
              const rm = rooms.find(r=>r.name===room.name);
              return (
                <div key={room.id} style={{background:"#fff",borderRadius:14,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",border:`2px solid ${s.over?"#ef9a9a":s.pct>0.8?"#ffcc80":"#a5d6a7"}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontWeight:700,fontSize:15,color:"#0f1f3d"}}>{room.name}</div>
                      <div style={{fontSize:11,color:"#888",marginTop:1}}>{s.label}</div>
                    </div>
                    <span style={{background:bgColor,color:barColor,borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700}}>
                      {s.over?"OVER RATIO":s.pct>0.8?"NEAR LIMIT":"OK"}
                    </span>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                    {[["Children",s.presentInRoom,"#0f1f3d"],["Staff",s.staffInRoom,"#1a73e8"],["Capacity",s.maxChildren,barColor]].map(([lbl,val,col])=>(
                      <div key={lbl} style={{textAlign:"center",background:"#f8fafd",borderRadius:8,padding:"8px 4px"}}>
                        <div style={{fontSize:20,fontWeight:700,color:col}}>{val}</div>
                        <div style={{fontSize:10,color:"#888",fontWeight:500}}>{lbl}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#888",marginBottom:4}}>
                      <span>Capacity used</span><span style={{fontWeight:600,color:barColor}}>{s.maxChildren>0?Math.round(s.pct*100):s.presentInRoom>0?100:0}%</span>
                    </div>
                    <div style={{height:8,background:"#f0f2f5",borderRadius:10,overflow:"hidden"}}>
                      <div style={{width:`${Math.min(s.maxChildren>0?s.pct*100:s.presentInRoom>0?100:0,100)}%`,height:"100%",background:barColor,borderRadius:10,transition:"width 0.4s"}}/>
                    </div>
                  </div>
                  <div style={{fontSize:11,color:"#888"}}>1:{s.ratio} ratio · {s.staffInRoom} staff scheduled today</div>
                  {s.over&&<div style={{marginTop:8,background:"#fce8e6",borderRadius:7,padding:"6px 10px",fontSize:11,color:"#c62828",fontWeight:600}}>🚨 Need {Math.ceil(s.presentInRoom/s.ratio)-s.staffInRoom} more staff or move {s.presentInRoom-s.maxChildren} child(ren)</div>}
                </div>
              );
            })}
          </div>
          <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:600,fontSize:14,color:"#0f1f3d",marginBottom:14}}>Today's Staff Coverage by Room</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {rooms.map(room=>{
                const todayName = new Date(today+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"}).slice(0,3);
                const onDuty = (schedules||[]).filter(s=>s.day===todayName&&(s.room===room.name||s.room==="All"));
                return (
                  <div key={room.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"#f8fafd",borderRadius:9}}>
                    <div style={{width:12,height:12,borderRadius:"50%",background:rooms.find(r=>r.name===room.name)?.color||"#888",flexShrink:0}}/>
                    <div style={{fontWeight:600,fontSize:13,width:100}}>{room.name}</div>
                    <div style={{display:"flex",gap:6,flex:1,flexWrap:"wrap"}}>
                      {onDuty.length===0?<span style={{color:"#bbb",fontSize:12,fontStyle:"italic"}}>No staff scheduled</span>:onDuty.map((sh,i)=>(
                        <span key={i} style={{background:"#e8f0fe",color:"#1a73e8",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:500}}>{sh.staffName.split(" ")[1]||sh.staffName} {sh.start}–{sh.end}</span>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {confirmDelete && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:14,padding:32,width:380,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div style={{fontSize:36,marginBottom:12}}>⚠️</div>
            <div style={{fontWeight:700,fontSize:17,marginBottom:8}}>Remove Staff Member?</div>
            <div style={{color:"#666",fontSize:13.5,marginBottom:20}}><strong>{confirmDelete.name}</strong> will be permanently removed.</div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <Btn label="Cancel" onClick={()=>setConfirmDelete(null)} secondary/>
              <button onClick={confirmAndDelete} style={{background:"#e53935",color:"#fff",border:"none",borderRadius:8,padding:"8px 20px",fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer"}}>Yes, Remove</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


// ─── Billing ──────────────────────────────────────────────────────────────────
function BillingModule({ invoices, setInvoices, children, setChildren, incidents, setEmailModal, showNotification, settings, focusChildId, setFocusChildId, payments, setPayments, subsidies, setSubsidies }) {
  const [tab, setTab]         = useState(focusChildId ? "invoices" : "invoices");
  const [filterChild, setFilterChild] = useState(focusChildId || null);
  const [filter, setFilter]   = useState("all");
  const [addingInv, setAddingInv] = useState(false);
  const [invForm, setInvForm] = useState({ childId: "", description: "", amount: "", due: "", status: "pending" });
  const [reportType, setReportType] = useState("billing");
  const [recordingPayment, setRecordingPayment] = useState(null); // invoice being paid
  const [payForm, setPayForm] = useState({ method: "ACH", amount: "", date: new Date().toISOString().split("T")[0], note: "" });
  const [addingSubsidy, setAddingSubsidy] = useState(false);
  const [subForm, setSubForm] = useState({ childId: "", type: "CCMS", agency: "", monthlyAmt: "", startDate: "", endDate: "", caseNumber: "", status: "active" });

  const filtered = invoices.filter(i => (filter === "all" || i.status === filter) && (!filterChild || i.childId === filterChild));
  const focusBillChild = filterChild ? children.find(c => c.id === filterChild) : null;
  const outstanding = invoices.filter(i => i.status !== "paid").reduce((s,i) => s + i.amount, 0);
  const collected   = invoices.filter(i => i.status === "paid").reduce((s,i) => s + i.amount, 0);
  const overdueAmt  = invoices.filter(i => i.status === "overdue").reduce((s,i) => s + i.amount, 0);

  const markPaid = (id) => { setInvoices(invoices.map(i => i.id === id ? { ...i, status: "paid" } : i)); showNotification("Marked as paid"); };
  const openRecordPayment = (inv) => {
    setRecordingPayment(inv);
    setPayForm({ method: "ACH", amount: String(inv.amount), date: new Date().toISOString().split("T")[0], note: "" });
  };
  const savePayment = () => {
    if (!payForm.amount || !recordingPayment) return;
    const amt = parseFloat(payForm.amount);
    const newPay = { id: "PAY-"+Date.now(), invoiceId: recordingPayment.id, childId: recordingPayment.childId, child: recordingPayment.child, amount: amt, method: payForm.method, date: payForm.date, note: payForm.note, recordedBy: "Jordan Bell" };
    setPayments(prev => [...(prev||[]), newPay]);
    // If payment >= invoice amount, mark paid
    const totalPaid = (payments||[]).filter(p => p.invoiceId === recordingPayment.id).reduce((s,p) => s+p.amount, 0) + amt;
    if (totalPaid >= recordingPayment.amount) {
      setInvoices(invoices.map(i => i.id === recordingPayment.id ? { ...i, status: "paid" } : i));
    }
    setRecordingPayment(null);
    showNotification(`Payment of $${amt} recorded (${payForm.method})`);
  };
  const saveSubsidy = () => {
    const child = children.find(c => c.id === parseInt(subForm.childId));
    if (!child || !subForm.monthlyAmt) return showNotification("Child and amount required");
    setSubsidies(prev => [...(prev||[]), { id: "SUB-"+Date.now(), childId: child.id, childName: child.name, ...subForm, monthlyAmt: parseFloat(subForm.monthlyAmt) }]);
    setAddingSubsidy(false);
    setSubForm({ childId: "", type: "CCMS", agency: "", monthlyAmt: "", startDate: "", endDate: "", caseNumber: "", status: "active" });
    showNotification(`Subsidy added for ${child.name}`);
  };
  const deleteInv = (id) => { setInvoices(invoices.filter(i => i.id !== id)); showNotification("Invoice deleted"); };
  const sendReminder = (inv) => { const child = children.find(c=>c.id===inv.childId); setEmailModal({ child, to: inv.email, ...emailTemplates.tuition_reminder(inv.child, inv.parent, inv.amount, inv.due, settings.centerName) }); };

  const saveInvoice = () => {
    const child = children.find(c => c.id === parseInt(invForm.childId));
    if (!child || !invForm.amount) return;
    const newInv = { id: `INV-${Date.now()}`, childId: child.id, child: child.name, parent: child.parent, email: child.email, amount: parseFloat(invForm.amount), due: invForm.due, status: invForm.status, description: invForm.description || `Tuition — ${child.name}` };
    setInvoices([...invoices, newInv]);
    setAddingInv(false); setInvForm({ childId:"", description:"", amount:"", due:"", status:"pending" });
    showNotification(`Invoice created for ${child.name}`);
  };

  const generateWeeklyInvoices = () => {
    const newInvs = children.map(c => ({
      id: `INV-${Date.now()}-${c.id}`, childId: c.id, child: c.name, parent: c.parent, email: c.email,
      amount: c.weeklyTuition || settings.tuitionRate,
      due: "2026-03-10", status: "pending",
      description: `Weekly tuition — ${c.name}`
    }));
    setInvoices([...invoices, ...newInvs]);
    showNotification(`${newInvs.length} weekly invoices generated`);
  };

  const statusColor = { paid: "#0f9d58", pending: "#f57c00", overdue: "#e53935" };

  // ── Report data ────────────────────────────────────────────────────────────
  const mealReport = Object.entries(mockLogs["2026-03-03"] || {}).map(([childId, log]) => {
    const child = children.find(c => c.id === parseInt(childId));
    return { name: child?.name || `Child ${childId}`, room: child?.room || "—", mood: log.mood, meals: log.meals, naps: log.naps, diapers: log.diapers, notes: log.notes };
  });

  const incidentReport = incidents.map(inc => ({
    ...inc,
    child: inc.child,
    notified: inc.parentNotified ? "Yes" : "No"
  }));

  const billingReport = children.map(c => {
    const childInvs = invoices.filter(i => i.childId === c.id);
    const lateInvs  = childInvs.filter(i => i.description?.toLowerCase().includes("late"));
    return {
      name: c.name, parent: c.parent, room: c.room,
      rate: `$${c.weeklyTuition || settings.tuitionRate}/wk`,
      cycle: c.billingCycle || "Weekly",
      paid: childInvs.filter(i => i.status === "paid").reduce((s,i) => s + i.amount, 0),
      outstanding: childInvs.filter(i => i.status !== "paid").reduce((s,i) => s + i.amount, 0),
      overdue: childInvs.filter(i => i.status === "overdue").reduce((s,i) => s + i.amount, 0),
      lateFees: lateInvs.reduce((s,i) => s + i.amount, 0),
    };
  });

  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f1f3d"}}>Billing & Reports</h1>
          <p style={{margin:"4px 0 0",color:"#888",fontSize:13}}>{outstanding} outstanding · {collected} collected</p>
        </div>
        <div style={{display:"flex",gap:8}}>
          {tab==="invoices" && <Btn label="⚡ Generate Weekly Invoices" onClick={generateWeeklyInvoices} secondary/>}
          {tab==="invoices" && <Btn label="+ New Invoice" onClick={()=>setAddingInv(true)}/>}
        </div>
      </div>

      {/* Summary cards */}
      {(() => {
        const totalSubsidyMo = (subsidies||[]).filter(s=>s.status==="active").reduce((sum,s)=>sum+s.monthlyAmt,0);
        const totalPaid = (payments||[]).reduce((sum,p)=>sum+p.amount,0);
        return (
          <div className="grid-4col" style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:12,marginBottom:20}}>
            {[["Collected","$"+collected,"#0f9d58","#e6f4ea"],["Outstanding","$"+outstanding,"#f57c00","#fef3e2"],["Overdue","$"+overdueAmt,"#e53935","#fce8e6"],["Payments Rec.",payments?.length||0+" total","#1a73e8","#e8f0fe"],["Monthly Subsidy","$"+totalSubsidyMo+"/mo","#7b1fa2","#f3e5f5"]].map(([l,v,c,bg])=>(
              <div key={l} style={{background:bg,borderRadius:10,padding:"12px 16px"}}>
                <div style={{fontSize:11,color:c,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.4px"}}>{l}</div>
                <div style={{fontSize:18,fontWeight:700,color:c,marginTop:4}}>{v}</div>
              </div>
            ))}
          </div>
        );
      })()}

      {/* Focus filter banner */}
      {focusBillChild && (
        <div style={{background:"#e8f0fe",border:"1.5px solid #c8dff7",borderRadius:10,padding:"11px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,color:"#1a73e8"}}>🔍 Filtered to <strong>{focusBillChild.name}</strong> · {filtered.length} invoice{filtered.length!==1?"s":""}</span>
          <button onClick={()=>{setFilterChild(null);if(setFocusChildId)setFocusChildId(null);}} style={{background:"none",border:"none",color:"#1a73e8",fontSize:12,cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>✕ Show all</button>
        </div>
      )}
      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:20,background:"#fff",borderRadius:10,padding:4,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",width:"fit-content"}}>
        {[["invoices","Invoices"],["payments","Payments"],["subsidies","Subsidies"],["fees","Fee Schedule"],["reports","Reports"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{padding:"7px 18px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:500,background:tab===id?"#0f1f3d":"transparent",color:tab===id?"#fff":"#666"}}>{label}</button>
        ))}
      </div>

      {/* ── Invoices tab ── */}
      {tab==="invoices" && (
        <div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {["all","pending","overdue","paid"].map(f=>(
              <button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 16px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontFamily:"inherit",fontSize:12.5,fontWeight:500,background:filter===f?"#0f1f3d":"#fff",color:filter===f?"#fff":"#555",borderColor:filter===f?"#0f1f3d":"#dde3ec"}}>
                {f.charAt(0).toUpperCase()+f.slice(1)}
              </button>
            ))}
          </div>
          <div className="mobile-scroll" style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:"#f8fafd"}}>{["Invoice","Child / Parent","Description","Amount","Due","Status","Actions"].map(h=><th key={h} style={{padding:"12px 16px",textAlign:"left",fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>{h}</th>)}</tr></thead>
              <tbody>
                {filtered.map(inv=>(
                  <tr key={inv.id} style={{borderTop:"1px solid #f2f4f8"}}>
                    <td style={{padding:"12px 16px",fontSize:13,fontWeight:500,color:"#1a73e8"}}>{inv.id}</td>
                    <td style={{padding:"12px 16px"}}><div style={{fontWeight:500,fontSize:13.5}}>{inv.child}</div><div style={{color:"#999",fontSize:11}}>{inv.parent}</div></td>
                    <td style={{padding:"12px 16px",fontSize:13,color:"#666"}}>{inv.description}</td>

rm, description: e.target.value })} rows={3} style={{ width: "100%", border: "1.5px solid #e0e0e0", borderRadius: 8, padding: "8px 10px", fontFamily: "inherit", fontSize: 13, resize: "vertical" }} /></div><div style={{ marginTop: 10 }}><label style={{ fontSize: 12, color: "#666", display: "block", marginBottom: 4 }}>Action Taken</label><textarea value={form.action} onChange={e => setForm({ ...form, action: e.target.value })} rows={2} style={{ width: "100%", border: "1.5px solid #e0e0e0", borderRadius: 8, padding: "8px 10px", fontFamily: "inherit", fontSize: 13, resize: "vertical" }} /></div><div style={{ marginTop: 16, display: "flex", justifyContent: "flex-end", gap: 8 }}><Btn label="Cancel" onClick={() => setAdding(false)} secondary /><Btn label="Create Report" onClick={addIncident} /></div></Modal>}

// ─── AI Assistant ─────────────────────────────────────────────────────────────
function AIAssistant({ children, staff, attendance, invoices, incidents, rooms, settings, activityLogs }) {
  const [messages, setMessages] = useState([{
    role: "assistant",
    content: "Hi! I'm your Primary Childcare AI assistant ✨\n\nI have full access to all system data — children, attendance, billing, incidents, staff, activity logs, and more. Ask me anything!\n\nTry asking: \"Who has outstanding balances?\" or \"What did the kids eat today?\" or \"List all active children and their rooms\""
  }]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);
  const today = "2026-03-03";
  const todayAtt = attendance[today] || [];
  const todayLogs = activityLogs?.[today] || {};

  // Build comprehensive system context with ALL data
  const buildSystemPrompt = () => {
    const childrenData = children.map(c => {
      const att = todayAtt.find(a => a.childId === c.id);
      const log = todayLogs[c.id];
      const childInvoices = invoices.filter(i => i.childId === c.id);
      const childIncidents = incidents.filter(i => i.childId === c.id);
      const phones = (c.phones||[{label:"Primary",number:c.phone}]).map(p=>`${p.number} (${p.label})`).join(", ");
      const attStatus = att?.present ? `present (in: ${att.checkIn})` : att?.checkOut ? `checked out (in: ${att.checkIn}, out: ${att.checkOut}${att.lateCheckOut ? `, late: ${att.lateCheckOut}${att.feeWaived?" [WAIVED]":""}` : ""})` : "absent";
      const logSummary = log ? `meals: ${log.meals.map(m=>`${m.type}(${m.amount})`).join(",")} | naps: ${log.naps.map(n=>`${n.start}-${n.end}`).join(",") || "none"} | mood: ${log.mood}${log.notes ? ` | note: "${log.notes}"` : ""}` : "no activity log";
      const billingStr = childInvoices.length ? childInvoices.map(i=>`${i.id}: $${i.amount} ${i.status}`).join("; ") : "none";
      const incidentStr = childIncidents.length ? childIncidents.map(i=>`${i.date}: ${i.type}`).join("; ") : "none";
      return `${c.name}${c.preferredName ? ` (goes by ${c.preferredName})` : ""} | Age: ${c.age} | Room: ${c.room} | Allergies: ${c.allergies} | Parent: ${c.parent} | Email: ${c.email} | Phones: ${phones} | Today: ${attStatus} | Activity: ${logSummary} | Invoices: ${billingStr} | Balance: $${c.balance||0} | Incidents: ${incidentStr}`;
    }).join("\n");

    const staffData = staff.map(s =>
      `${s.name} | ${s.role} | Rooms: ${(s.rooms||[s.room]).join(",")} | ${s.email} | ${s.phone} | Certs: ${s.certifications}`
    ).join("\n");

    const roomData = rooms.map(r => {
      const cnt = children.filter(c => c.room === r.name).length;
      return `${r.name}: ${cnt}/${r.capacity} | Ages: ${r.ageRange}`;
    }).join("\n");

    const invoiceData = invoices.map(i =>
      `${i.id}: ${i.child} | $${i.amount} | ${i.status} | Due: ${i.due} | ${i.description}`
    ).join("\n");

    const incidentData = incidents.map(i =>
      `${i.child} (${i.date}): ${i.type} | ${i.description} | Action: ${i.action} | Parent notified: ${i.parentNotified}`
    ).join("\n");

    const presentNames = todayAtt.filter(a => a.present).map(a => children.find(c => c.id === a.childId)?.name).filter(Boolean).join(", ");
    const absentNames = children.filter(c => !todayAtt.find(a => a.childId === c.id)?.present).map(c => c.name).join(", ");
    const latePickupStr = todayAtt.filter(a => a.lateCheckOut).map(a => {
      const c = children.find(ch => ch.id === a.childId);
      return `${c?.name}: ${a.lateCheckOut}${a.feeWaived ? " (waived)" : ""}`;
    }).join(", ") || "none";
    const overdueTotal = invoices.filter(i => i.status === "overdue").reduce((s,i) => s+i.amount, 0);
    const outstandingTotal = invoices.filter(i => i.status !== "paid").reduce((s,i) => s+i.amount, 0);

    return [
      `You are the AI assistant for ${settings.centerName} at ${settings.address}.`,
      `Hours: ${settings.hours}. Today: ${today}. Phone: ${settings.phone} | Email: ${settings.email}`,
      "",
      "=== SUMMARY ===",
      `Enrolled: ${children.length} | Present: ${todayAtt.filter(a=>a.present).length} | Absent: ${children.length - todayAtt.filter(a=>a.present).length} | Late pickups: ${todayAtt.filter(a=>a.lateCheckOut).length}`,
      `Outstanding: $${outstandingTotal} | Overdue: $${overdueTotal} | Open incidents: ${incidents.filter(i=>!i.parentNotified).length}`,
      "",
      "=== CHILDREN ===",
      childrenData,
      "",
      `Present today: ${presentNames || "none"}`,
      `Absent today: ${absentNames || "none"}`,
      `Late pickups: ${latePickupStr}`,
      "",
      "=== STAFF ===",
      staffData,
      "",
      "=== ROOMS ===",
      roomData,
      "",
      "=== INVOICES ===",
      invoiceData,
      "",
      "=== INCIDENTS ===",
      incidentData || "none",
      "",
      "=== SETTINGS ===",
      `Tuition: $${settings.tuitionRate}/wk | Late fee: $${settings.latePickupFee}/15min | Registration: $${settings.registrationFee}`,
      "",
      "Answer accurately using the data above. Be concise and professional. When asked to draft emails, write warm professional communications.",
    ].join("\n");
  };

    useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: "user", content: input };
    const newMsgs = [...messages, userMsg];
    setMessages(newMsgs);
    setInput("");
    setLoading(true);
    try {
      const res = await fetch(ANTHROPIC_API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1500,
          system: buildSystemPrompt(),
          messages: newMsgs.map(m => ({ role: m.role, content: m.content }))
        })
      });
      const data = await res.json();
      const text = data.content?.[0]?.text || "Sorry, I couldn't get a response.";

function Modal({ title, onClose, children, wide }) {
  const isMob = typeof window !== "undefined" && window.innerWidth < 768;
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.4)", zIndex: 1000, display: "flex", alignItems: isMob ? "flex-end" : "center", justifyContent: "center" }}>

function Btn({ label, onClick, secondary }) {
  return <button onClick={onClick} style={{ background: secondary ? "#fff" : "#0f1f3d", color: secondary ? "#0f1f3d" : "#fff", border: secondary ? "1.5px solid #dde3ec" : "none", borderRadius: 8, padding: "8px 16px", fontFamily: "inherit", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>{label}</button>;
}

function Avatar({ name, size = 36, colorIndex, photo }) {
  const colors = ["#1a73e8", "#0f9d58", "#f57c00", "#7b1fa2", "#c62828", "#00838f"];
  const idx = colorIndex !== undefined ? colorIndex % colors.length : (name.charCodeAt(0) % colors.length);
  if (photo) return <div style={{ width: size, height: size, borderRadius: "50%", overflow: "hidden", flexShrink: 0, border: "2px solid #e0e8f4" }}><img src={photo} alt={name} style={{ width: "100%", height: "100%", objectFit: "cover" }} /></div>;
  return (<div style={{ width: size, height: size, borderRadius: "50%", background: colors[idx], display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><span style={{ color: "#fff", fontWeight: 600, fontSize: size * 0.35 }}>{name.split(" ").map(n => n[0]).join("").slice(0, 2)}</span></div>);
}

function StatusPill({ status }) {
  const map = { present: ["#e6f4ea", "#2e7d32", "Present"], absent: ["#fce8e6", "#c62828", "Absent"], active: ["#e8f0fe", "#1a73e8", "Active"], inactive: ["#f5f5f5", "#888", "Inactive"] };
  const [bg, color, label] = map[status] || ["#f5f5f5", "#666", status];
  return <span style={{ background: bg, color, borderRadius: 6, padding: "3px 10px", fontSize: 11.5, fontWeight: 600 }}>{label}</span>;
}

function ActivityLogsModule({ children, allChildren, attendance, staff, showNotification, globalFilters }) {
  const today = "2026-03-03";

  const [editForm, setEditForm] = useState(null);

  // Filter to present children, also respect globalFilters.childId

  const presentChildren = children.filter(c => { const a = dayAtt.find(x=>x.childId===c.id); return a?.present||a?.checkOut; });
  const activeChildren = (presentChildren.length > 0 ? presentChildren : children)
    .filter(c => !globalFilters?.childId || c.id === globalFilters.childId);

  if (globalFilters?.room) actFilterDesc.push(`Room: ${globalFilters.room}`);

  if (globalFilters?.dateFrom) actFilterDesc.push(`From ${globalFilters.dateFrom}${globalFilters.dateTo?` → ${globalFilters.dateTo}`:""}`);

  const getLog = (childId) => logs[date]?.[childId] || { meals:[], naps:[], diapers:[], mood:"🙂 Good", notes:"", assignedTeacher:"" };

  const openEdit = (child) => { setEditing(child.id); setEditForm(JSON.parse(JSON.stringify(getLog(child.id)))); };

  const saveLog = () => {
    setLogs(prev => ({ ...prev, [date]: { ...(prev[date]||{}), [editing]: editForm } }));
    setEditing(null); showNotification("Activity log saved");
  };

  const addMeal   = () => setEditForm(f => ({ ...f, meals:[...f.meals,{time:"",type:"Snack",food:"",amount:"All"}] }));
  const addNap    = () => setEditForm(f => ({ ...f, naps:[...f.naps,{start:"",end:""}] }));

    if (!nap.start||!nap.end) return "";
    const [sh,sm]=nap.start.split(":").map(Number);

                  {log.notes&&<div style={{marginTop:8,fontSize:12,color:"#777",fontStyle:"italic",background:"#f8fafd",borderRadius:6,padding:"6px 10px"}}>&ldquo;{log.notes}&rdquo;</div>}
                  {child.allergies!=="None"&&<div style={{marginTop:8,background:"#fff8e1",borderRadius:6,padding:"5px 9px",fontSize:11,color:"#795548"}}>⚠️ Allergy: {child.allergies}</div>}
                </div>

        ) : (

            <div style={{marginBottom:18}}>
              <div style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:6}}>👩🏫 Assigned Teacher</div>

                  <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>End</label><input type="time" value={n.end} onChange={e=>{const arr=[...editForm.naps];arr[i]={...n,end:e.target.value};setEditForm({...editForm,naps:arr});}} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}/></div>

              </div>
              {editForm.diapers.map((d,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"100px 110px 28px",gap:8,marginBottom:8,alignItems:"center"}}>

                  <select value={d.type} onChange={e=>{const arr=[...editForm.diapers];arr[i]={...d,type:e.target.value};setEditForm({...editForm,diapers:arr});}} style={{border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}>
                    {["Wet","BM","Dry","Both"].map(t=><option key={t}>{t}</option>)}
                  </select>
                  <button onClick={()=>setEditForm({...editForm,diapers:editForm.diapers.filter((_,j)=>j!==i)})} style={{background:"#fce8e6",color:"#c62828",border:"none",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>×</button>
                </div>
              ))}
            </div>

            {/* Notes */}
            <div style={{marginBottom:20}}>
              <div style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:6}}>📝 Teacher Notes</div>
              <textarea value={editForm.notes} onChange={e=>setEditForm({...editForm,notes:e.target.value})} rows={3} placeholder="Share highlights, milestones, anything parents should know..." style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13,resize:"vertical"}}/>
            </div>

            <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
              <Btn label="Cancel" onClick={()=>setEditing(null)} secondary/>
              <Btn label="💾 Save Log" onClick={saveLog}/>
            </div>
          </div>
        )
      )}

      {/* ── Weekly Summary View ── */}
      {viewMode==="weekly" && (
        <div>
          <div style={{fontWeight:600,fontSize:14,color:"#0f1f3d",marginBottom:14}}>Week of {weekDates[0]} — {weekDates[4]}</div>
          <div style={{background:"#fff",borderRadius:12,overflow:"auto",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <table style={{width:"100%",borderCollapse:"collapse",minWidth:700}}>
              <thead>
                <tr style={{background:"#f8fafd"}}>
                  <th style={{padding:"11px 16px",textAlign:"left",fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",minWidth:130}}>Child</th>
                  {weekDates.map(d => {
                    const dayName = new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"});
                    const isToday = d===today;
                    return <th key={d} style={{padding:"11px 12px",textAlign:"center",fontSize:11,fontWeight:600,color:isToday?"#1a73e8":"#888",background:isToday?"#f0f7ff":"transparent",textTransform:"uppercase",minWidth:120}}>{dayName}<br/><span style={{fontSize:10,fontWeight:400}}>{d.slice(5)}</span></th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {children.map(child => (
                  <tr key={child.id} style={{borderTop:"1px solid #f2f4f8"}}>
                    <td style={{padding:"10px 16px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <Avatar name={child.name} size={28}/>
                        <div style={{fontWeight:500,fontSize:13}}>{child.name}</div>
                      </div>
                    </td>
                    {weekDates.map(d => {
                      const log = logs[d]?.[child.id];
                      const dayAttRec = attendance?.[d] || [];
                      const att = dayAttRec.find(a=>a.childId===child.id);
                      const present = att?.present||att?.checkOut;
                      const isToday = d===today;
                      return (
                        <td key={d} style={{padding:"8px 12px",textAlign:"center",background:isToday?"#f8fcff":"transparent",verticalAlign:"top"}}>
                          {!present ? (
                            <span style={{background:"#fce8e6",color:"#c62828",borderRadius:5,padding:"2px 9px",fontSize:11,fontWeight:600}}>Absent</span>
                          ) : log ? (
                            <div style={{fontSize:11,lineHeight:1.6}}>
                              <div style={{fontWeight:600,color:"#333"}}>{log.mood?.split(" ")?.[0]}</div>
                              <div style={{color:"#0f9d58"}}>{log.meals.length} meal{log.meals.length!==1?"s":""}</div>
                              <div style={{color:"#7b1fa2"}}>{log.naps.length>0?log.naps.length+" nap":"No nap"}</div>
                              {log.assignedTeacher&&<div style={{color:"#888",fontSize:10}}>{log.assignedTeacher.split(" ")[0]}</div>}
                            </div>
                          ) : (
                            <span style={{color:"#ccc",fontSize:11}}>No log</span>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

function DocumentsModule({ children, staff, showNotification }) {
  const [view, setView] = useState("overview");
  const [selectedPerson, setSelectedPerson] = useState(null);
  const [personType, setPersonType] = useState("children");
  const [docs, setDocs] = useState(mockDocs);
  const [uploading, setUploading] = useState(false);
  const [uploadForm, setUploadForm] = useState({ name:"", category:"Health", expires:"" });

  const statusColor = { current:"#0f9d58", expiring:"#f57c00", missing:"#e53935", expired:"#e53935" };
  const statusBg    = { current:"#e6f4ea", expiring:"#fef3e2", missing:"#fce8e6", expired:"#fce8e6" };

  const allChildDocs = Object.values(docs.children).flat();
  const allStaffDocs = Object.values(docs.staff).flat();
  const missingCount  = [...allChildDocs,...allStaffDocs].filter(d=>d.status==="missing").length;
  const expiringCount = [...allChildDocs,...allStaffDocs].filter(d=>d.status==="expiring").length;

  const openPerson = (person, type) => { setSelectedPerson(person); setPersonType(type); setView("person"); };

  const addDoc = () => {
    if (!uploadForm.name) return;
    const newDoc = { id:Date.now(), name:uploadForm.name, category:uploadForm.category, status:"current", uploaded:"2026-03-03", expires:uploadForm.expires||null };
    const key = personType==="children" ? "children" : "staff";
    setDocs(prev=>({...prev,[key]:{...prev[key],[selectedPerson.id]:[...(prev[key][selectedPerson.id]||[]),newDoc]}}));
    setUploading(false); setUploadForm({name:"",category:"Health",expires:""});
    showNotification(`${uploadForm.name} uploaded`);
  };

  const removeDoc = (docId) => {
    const key = personType==="children" ? "children" : "staff";
    setDocs(prev=>({...prev,[key]:{...prev[key],[selectedPerson.id]:prev[key][selectedPerson.id].filter(d=>d.id!==docId)}}));
    showNotification("Document removed");
  };

  const getPersonDocs = () => {
    if (!selectedPerson) return [];
    const key = personType==="children" ? "children" : "staff";
    return docs[key][selectedPerson.id] || [];
  };

  const docCategories = ["Health","Enrollment","Emergency","Certification","Education","Compliance","Legal","Other"];

  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}}>
        <div>
          <h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f1f3d"}}>Documents & Compliance</h1>
          <p style={{margin:"4px 0 0",color:"#888",fontSize:13}}>Immunization records · Enrollments · Certifications · Background checks</p>
        </div>
        {view==="person" && <Btn label="← Back to Overview" onClick={()=>setView("overview")} secondary/>}
      </div>

      {view==="overview" && (
        <div>
          {(missingCount>0||expiringCount>0) && (
            <div style={{background:"#fff8e1",border:"1.5px solid #ffe082",borderRadius:10,padding:"12px 16px",marginBottom:20,display:"flex",gap:20,alignItems:"center"}}>
              <span style={{fontSize:18}}>⚠️</span>
              <div style={{flex:1}}>
                <div style={{fontWeight:600,fontSize:13.5,color:"#5d4037"}}>Compliance Attention Required</div>
                <div style={{fontSize:12.5,color:"#795548",marginTop:2}}>
                  {missingCount>0&&<span style={{color:"#c62828",fontWeight:500}}>{missingCount} missing · </span>}
                  {expiringCount>0&&<span style={{color:"#e65100",fontWeight:500}}>{expiringCount} expiring soon</span>}
                </div>
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:8,marginBottom:20}}>
            {["children","staff"].map(t=>(
              <button key={t} onClick={()=>setPersonType(t)} style={{padding:"6px 16px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontFamily:"inherit",fontSize:12.5,fontWeight:500,background:personType===t?"#0f1f3d":"#fff",color:personType===t?"#fff":"#555",borderColor:personType===t?"#0f1f3d":"#dde3ec",textTransform:"capitalize"}}>{t}</button>
            ))}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14}}>
            {(personType==="children"?children:staff).map(person=>{
              const key = personType==="children"?"children":"staff";
              const personDocs = docs[key][person.id]||[];
              const missing  = personDocs.filter(d=>d.status==="missing").length;
              const expiring = personDocs.filter(d=>d.status==="expiring").length;
              const current  = personDocs.filter(d=>d.status==="current").length;
              const score = personDocs.length===0?0:Math.round((current/personDocs.length)*100);
              const scoreColor = score===100?"#0f9d58":score>=70?"#f57c00":"#e53935";
              return (
                <div key={person.id} onClick={()=>openPerson(person,personType)} style={{background:"#fff",borderRadius:12,padding:18,cursor:"pointer",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",transition:"transform 0.15s"}} onMouseEnter={e=>e.currentTarget.style.transform="translateY(-2px)"} onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
                  <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                    <Avatar name={person.name} size={38}/>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:600,fontSize:13.5}}>{person.name}</div>
                      <div style={{color:"#888",fontSize:11}}>{personDocs.length} documents</div>
                    </div>
                    <div style={{textAlign:"center"}}>
                      <div style={{fontSize:18,fontWeight:700,color:scoreColor}}>{score}%</div>
                      <div style={{fontSize:10,color:"#aaa"}}>complete</div>
                    </div>
                  </div>
                  <div style={{background:"#f0f4f8",borderRadius:4,height:6,marginBottom:8}}><div style={{background:scoreColor,borderRadius:4,height:6,width:`${score}%`}}/></div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    {current>0&&<span style={{background:"#e6f4ea",color:"#2e7d32",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:600}}>{current} current</span>}
                    {expiring>0&&<span style={{background:"#fef3e2",color:"#e65100",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:600}}>{expiring} expiring</span>}
                    {missing>0&&<span style={{background:"#fce8e6",color:"#c62828",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:600}}>{missing} missing</span>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {view==="person" && selectedPerson && (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:24,background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <Avatar name={selectedPerson.name} size={52}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:17}}>{selectedPerson.name}</div>
              <div style={{color:"#888",fontSize:13}}>{personType==="children"?`${selectedPerson.room} Room · Parent: ${selectedPerson.parent}`:selectedPerson.role}</div>
            </div>
            <Btn label="+ Upload Document" onClick={()=>setUploading(true)}/>
          </div>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {getPersonDocs().length===0&&<div style={{background:"#fff",borderRadius:12,padding:40,textAlign:"center",color:"#ccc",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>No documents on file yet</div>}
            {getPersonDocs().map(doc=>(
              <div key={doc.id} style={{background:"#fff",borderRadius:10,padding:"14px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <div style={{width:38,height:38,borderRadius:8,background:"#f0f4f8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>

                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
