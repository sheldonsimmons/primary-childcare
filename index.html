  const [activeTab, setActiveTab] = useState("dashboard");
  const [isMobile, setIsMobile] = useState(() => typeof window !== "undefined" && window.innerWidth < 768);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const [focusChildId, setFocusChildId] = useState(null);

  const goToChildIncidents = (childId) => { setFocusChildId(childId); setActiveTab("incidents"); };

  const [incidents, setIncidents] = useState(mockIncidents);
  const [rooms, setRooms] = useState(defaultRooms);
  const [settings, setSettings] = useState(defaultSettings);
  const [users, setUsers] = useState(mockUsers);
  const [payments, setPayments] = useState(mockPayments);
  const [subsidies, setSubsidies] = useState(mockSubsidies);
  const [schedules, setSchedules] = useState(mockSchedules);
  const [widgetOrder, setWidgetOrder] = useState(DEFAULT_WIDGET_ORDER);
  const [emailModal, setEmailModal] = useState(null);
  const [commLog, setCommLog] = useState(mockCommLog);

// ─── Global Filter Bar ────────────────────────────────────────────────────────
function GlobalFilterBar({ filters, setFilters, onClear, activeCount, open, setOpen, children, staff, rooms, activeTab }) {
  const FILTERABLE_TABS = ["children","attendance","activity","staff","incidents","billing","comms","signin"];
  if (!FILTERABLE_TABS.includes(activeTab)) return null;

  const activeChild = children.find(c => c.id === filters.childId);
  const activeStaff = staff.find(s => s.id === filters.staffId);

  const chipStyle = (active) => ({
    display: "inline-flex", alignItems: "center", gap: 5,
    padding: "3px 10px 3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 500, cursor: "pointer",
    background: active ? "#0f1f3d" : "#f0f4f8",
    color: active ? "#fff" : "#555",
    border: active ? "1.5px solid #0f1f3d" : "1.5px solid #dde3ec",
    userSelect: "none",
  });

  const dismissBtn = (onClick) => (
    <span onClick={e => { e.stopPropagation(); onClick(); }}
      style={{ marginLeft: 2, fontWeight: 700, fontSize: 13, opacity: 0.6, lineHeight: 1 }}>×</span>
  );

  return (
    <div style={{ marginBottom: 20, borderRadius: 12, overflow: "hidden", border: "1.5px solid #dde3ec", background: "#fff", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
      {/* Header bar — always visible */}
      <div
        onClick={() => setOpen(o => !o)}
        style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 16px", cursor: "pointer", background: activeCount > 0 ? "#f0f7ff" : "#fff", borderBottom: open ? "1.5px solid #e8f0fe" : "none" }}
      >
        <span style={{ fontSize: 15 }}>🔍</span>
        <span style={{ fontWeight: 600, fontSize: 13, color: "#0f1f3d" }}>Filter</span>
        {activeCount > 0 && (
          <span style={{ background: "#1a73e8", color: "#fff", borderRadius: 10, padding: "1px 7px", fontSize: 11, fontWeight: 700 }}>{activeCount}</span>
        )}

        {/* Active filter chips — show inline when collapsed */}
        {!open && activeCount > 0 && (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", flex: 1 }}>
            {filters.room && <span style={chipStyle(true)}>{filters.room} {dismissBtn(() => setFilters(f => ({ ...f, room: null })))}</span>}
            {activeChild && <span style={chipStyle(true)}>{activeChild.preferredName || activeChild.name.split(" ")[0]} {dismissBtn(() => setFilters(f => ({ ...f, childId: null })))}</span>}
            {activeStaff && <span style={chipStyle(true)}>{activeStaff.name.split(" ").pop()} {dismissBtn(() => setFilters(f => ({ ...f, staffId: null })))}</span>}
            {filters.dateFrom && <span style={chipStyle(true)}>{filters.dateFrom}{filters.dateTo ? ` → ${filters.dateTo}` : ""} {dismissBtn(() => setFilters(f => ({ ...f, dateFrom: null, dateTo: null })))}</span>}
          </div>
        )}

        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
          {activeCount > 0 && (
            <button onClick={e => { e.stopPropagation(); onClear(); }}
              style={{ background: "#fce8e6", color: "#c62828", border: "none", borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 500, cursor: "pointer", fontFamily: "inherit" }}>
              Clear all
            </button>
          )}
          <span style={{ color: "#bbb", fontSize: 13, transform: open ? "rotate(180deg)" : "none", display: "inline-block", transition: "transform 0.2s" }}>▼</span>
        </div>
      </div>

      {/* Expanded filter panel */}
      {open && (
        <div style={{ padding: "14px 16px", display: "flex", gap: 20, flexWrap: "wrap", alignItems: "flex-end" }}>

          {/* Room */}
          <div style={{ minWidth: 140 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 6 }}>Classroom</div>
            <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
              <button onClick={() => setFilters(f => ({ ...f, room: null }))}
                style={chipStyle(!filters.room)}>All</button>
              {rooms.map(r => {
                const active = filters.room === r.name;
                return (
                  <button key={r.id} onClick={() => setFilters(f => ({ ...f, room: active ? null : r.name }))}
                    style={{ ...chipStyle(active), background: active ? r.color : "#f0f4f8", borderColor: active ? r.color : "#dde3ec", color: active ? "#fff" : "#555" }}>
                    {r.name}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Child */}
          <div style={{ minWidth: 180 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 6 }}>Child</div>
            <select
              value={filters.childId || ""}

          </div>

          <div style={{ minWidth: 180 }}>

            >
              <option value="">All staff</option>
              {(filters.room ? staff.filter(s => (s.rooms||[s.room]).includes(filters.room)) : staff)
                .map(s => <option key={s.id} value={s.id}>{s.name} — {s.role}</option>)}
            </select>
          </div>

          {/* Date range */}
          <div>
            <div style={{ fontSize: 11, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.5px", marginBottom: 6 }}>Date Range</div>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <input type="date" value={filters.dateFrom || ""} onChange={e => setFilters(f => ({ ...f, dateFrom: e.target.value || null }))}
                style={{ border: "1.5px solid #dde3ec", borderRadius: 8, padding: "6px 8px", fontFamily: "inherit", fontSize: 13, background: filters.dateFrom ? "#e8f0fe" : "#fff" }} />
              <span style={{ color: "#bbb", fontSize: 13 }}>→</span>
              <input type="date" value={filters.dateTo || ""} onChange={e => setFilters(f => ({ ...f, dateTo: e.target.value || null }))}
                style={{ border: "1.5px solid #dde3ec", borderRadius: 8, padding: "6px 8px", fontFamily: "inherit", fontSize: 13, background: filters.dateTo ? "#e8f0fe" : "#fff" }} />
              {/* Quick presets */}
              <div style={{ display: "flex", gap: 4, marginLeft: 4 }}>
                {[
                  ["Today", "2026-03-03", "2026-03-03"],
                  ["This Week", "2026-03-02", "2026-03-06"],
                  ["This Month", "2026-03-01", "2026-03-31"],
                ].map(([label, from, to]) => (
                  <button key={label} onClick={() => setFilters(f => ({ ...f, dateFrom: from, dateTo: to }))}
                    style={{ background: filters.dateFrom===from && filters.dateTo===to ? "#0f1f3d" : "#f0f4f8", color: filters.dateFrom===from && filters.dateTo===to ? "#fff" : "#555", border: "1.5px solid #dde3ec", borderRadius: 7, padding: "5px 10px", fontSize: 11.5, fontWeight: 500, cursor: "pointer", fontFamily: "inherit", whiteSpace: "nowrap" }}>
                    {label}
                  </button>
                ))}
              </div>
            </div>
          </div>

        </div>
      )}
    </div>
  );
}

function CustomRoleCreator({ customRoles, setCustomRoles, allTabs, showNotification }) {
  const [roleName, setRoleName] = useState("");
  const [selectedPerms, setSelectedPerms] = useState(["dashboard"]);
  const togglePerm = (tab) => setSelectedPerms(p => p.includes(tab) ? p.filter(x => x !== tab) : [...p, tab]);
  const save = () => {
    if (!roleName.trim()) return showNotification("Role name required");
    if (customRoles?.[roleName]) return showNotification(`Role "${roleName}" already exists`);
    setCustomRoles({ ...(customRoles||{}), [roleName]: selectedPerms });
    setRoleName(""); setSelectedPerms(["dashboard"]);
    showNotification(`Role "${roleName}" created`);
  };
  return (
    <div style={{ background: "#fff", borderRadius: 10, padding: 16, border: "1.5px solid #e0e8f4", marginTop: 8 }}>
      <div style={{ fontWeight: 600, fontSize: 13, color: "#0f1f3d", marginBottom: 10 }}>+ Create New Role</div>
      <input value={roleName} onChange={e => setRoleName(e.target.value)} placeholder="Role name (e.g. Volunteer, Nurse)..."
        style={{ width: "100%", border: "1.5px solid #e0e0e0", borderRadius: 8, padding: "8px 10px", fontFamily: "inherit", fontSize: 13, marginBottom: 10 }} />
      <div style={{ fontSize: 11, color: "#888", fontWeight: 600, marginBottom: 8, textTransform: "uppercase", letterSpacing: "0.4px" }}>Tab Access</div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
        {allTabs.map(tab => (
          <label key={tab} style={{ display: "flex", alignItems: "center", gap: 4, background: selectedPerms.includes(tab) ? "#e8f0fe" : "#f8fafd", border: `1px solid ${selectedPerms.includes(tab) ? "#c8dff7" : "#e0e0e0"}`, borderRadius: 6, padding: "5px 10px", cursor: "pointer", fontSize: 12, fontWeight: selectedPerms.includes(tab) ? 600 : 400, color: selectedPerms.includes(tab) ? "#1a73e8" : "#666" }}>
            <input type="checkbox" checked={selectedPerms.includes(tab)} onChange={() => togglePerm(tab)} style={{ marginRight: 2 }} />
            {tab}
          </label>
        ))}
      </div>
      <Btn label="Create Role" onClick={save} />
    </div>
  );
}

  const roomColors = ["#1a73e8", "#0f9d58", "#f57c00", "#7b1fa2", "#c62828", "#00838f", "#e91e63", "#795548"];

  const saveRoom = () => {
    if (!roomForm.name.trim()) return;
    if (editingRoom) { setRooms(rooms.map(r => r.id === editingRoom.id ? { ...r, ...roomForm, capacity: parseInt(roomForm.capacity) || r.capacity } : r)); showNotification(`${roomForm.name} updated`); setEditingRoom(null); }
    else { setRooms([...rooms, { ...roomForm, id: Date.now(), capacity: parseInt(roomForm.capacity) || 10 }]); showNotification(`${roomForm.name} room added`); setAddingRoom(false); }
    setRoomForm({ name: "", ageRange: "", capacity: "", color: "#1a73e8" });

  const deleteRoom = (id) => {
    const room = rooms.find(r => r.id === id);

    setRooms(rooms.filter(r => r.id !== id)); showNotification("Room deleted");

  const saveUser = () => {
    if (!userForm.name || !userForm.email) return;
    setUsers([...users, { ...userForm, id: Date.now(), status: "active", lastLogin: "Never" }]);

          <p style={{ fontSize: 12, color: "#888", margin: "0 0 16px" }}>Customize the categories used when filing incident reports.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
            {customTypes.map((type, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 12px", background: "#f8fafd", borderRadius: 8 }}>
                <span style={{ fontSize: 13, fontWeight: 500 }}>{type}</span>
                <button onClick={() => setCustomTypes(customTypes.filter((_, j) => j !== i))} style={{ background: "#fce8e6", color: "#c62828", border: "none", borderRadius: 5, padding: "3px 10px", cursor: "pointer", fontSize: 11, fontWeight: 500 }}>Remove</button>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={newType} onChange={e => setNewType(e.target.value)} placeholder="Add new type..." style={{ flex: 1, border: "1.5px solid #e0e0e0", borderRadius: 8, padding: "8px 10px", fontFamily: "inherit", fontSize: 13 }} />
            <Btn label="Add" onClick={() => { if (newType.trim()) { setCustomTypes([...customTypes, newType.trim()]); setNewType(""); showNotification("Type added"); } }} />
          </div>
        </div>
      )}

      {section === "customroles" && (
        <div style={{ maxWidth: 640 }}>
          <div style={{ fontWeight: 700, fontSize: 16, color: "#0f1f3d", marginBottom: 4 }}>🎭 Custom Roles</div>
          <p style={{ fontSize: 13, color: "#888", margin: "0 0 20px" }}>
            Create roles with specific tab access. Assign them to staff by updating their role in Staff settings.
            Built-in roles (Director, Admin, etc.) cannot be deleted.
          </p>

          {/* Existing custom roles */}
          {Object.keys(customRoles||{}).length === 0 && (
            <div style={{ background: "#f8fafd", borderRadius: 10, padding: 20, textAlign: "center", color: "#aaa", fontSize: 13, marginBottom: 16, border: "1.5px dashed #dde3ec" }}>
              No custom roles yet — create one below
            </div>
          )}
          {Object.entries(customRoles||{}).map(([roleName, perms]) => (
            <div key={roleName} style={{ background: "#fff", borderRadius: 12, padding: "16px 18px", marginBottom: 12, border: "1.5px solid #e0e8f4", boxShadow: "0 1px 3px rgba(0,0,0,0.04)" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ background: "#e8f0fe", color: "#1a73e8", borderRadius: 8, padding: "3px 10px", fontSize: 12, fontWeight: 700 }}>🎭 {roleName}</span>
                  <span style={{ fontSize: 12, color: "#888" }}>{perms.length} tab{perms.length !== 1 ? "s" : ""} accessible</span>
                </div>
                <button onClick={() => { const r = { ...(customRoles||{}) }; delete r[roleName]; setCustomRoles(r); showNotification(`"${roleName}" deleted`); }}
                  style={{ background: "#fce8e6", color: "#c62828", border: "none", borderRadius: 6, padding: "4px 12px", fontSize: 12, cursor: "pointer", fontFamily: "inherit", fontWeight: 500 }}>Delete Role</button>
              </div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {(allTabs||[]).map(tab => {
                  const hasAccess = perms.includes(tab);
                  return (
                    <button key={tab} onClick={() => {
                      const newPerms = hasAccess ? perms.filter(p => p !== tab) : [...perms, tab];
                      setCustomRoles({ ...(customRoles||{}), [roleName]: newPerms });
                    }} style={{ background: hasAccess ? "#e8f0fe" : "#f8fafd", border: `1.5px solid ${hasAccess ? "#c8dff7" : "#e0e0e0"}`, borderRadius: 6, padding: "4px 10px", cursor: "pointer", fontSize: 12, fontWeight: hasAccess ? 600 : 400, color: hasAccess ? "#1a73e8" : "#aaa", fontFamily: "inherit" }}>
                      {hasAccess ? "✓ " : ""}{tab}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}

          {/* Create new role */}
          <div style={{ background: "#fff", borderRadius: 12, padding: "18px 20px", border: "1.5px solid #e0e8f4", marginTop: 8 }}>
            <div style={{ fontWeight: 600, fontSize: 14, color: "#0f1f3d", marginBottom: 14 }}>+ Create New Role</div>
            <CustomRoleCreator customRoles={customRoles} setCustomRoles={setCustomRoles} allTabs={allTabs||[]} showNotification={showNotification} />
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ children, staff, attendance, invoices, incidents, rooms, widgetOrder, setWidgetOrder, canDrag, schedules }) {
  const today = "2026-03-03";
  const todayAtt = attendance[today] || [];
  const presentCount = todayAtt.filter(a => a.present).length;
  const overdueInvoices = invoices.filter(i => i.status === "overdue");
  const totalOutstanding = invoices.filter(i => i.status !== "paid").reduce((s, i) => s + i.amount, 0);
  const [dragging, setDragging] = useState(null);
  const [dragOver, setDragOver] = useState(null);

  const onDragStart = (e, id) => { if (!canDrag) return; setDragging(id); e.dataTransfer.effectAllowed = "move"; };
  const onDragOver  = (e, id) => { e.preventDefault(); setDragOver(id); };
  const onDrop = (e, targetId) => {
    e.preventDefault();
    if (!dragging || dragging === targetId) { setDragging(null); setDragOver(null); return; }
    const order = [...(widgetOrder||DEFAULT_WIDGET_ORDER)];
    const fi = order.indexOf(dragging), ti = order.indexOf(targetId);
    order.splice(fi, 1); order.splice(ti, 0, dragging);
    setWidgetOrder(order); setDragging(null); setDragOver(null);
  };
  const wrapStyle = (id) => ({ opacity: dragging===id ? 0.4 : 1, outline: dragOver===id ? "2.5px dashed #4fc3f7" : "none", borderRadius: 12, cursor: canDrag ? "grab" : "default" });

  const StatCard = ({s}) => (
    <div style={{ background:"#fff", borderRadius:12, padding:"18px 20px", boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
      <div style={{ color:"#888", fontSize:11, fontWeight:600, marginBottom:6, textTransform:"uppercase", letterSpacing:"0.5px" }}>{s.label}</div>
      <div style={{ fontSize:26, fontWeight:700, color:s.color, marginBottom:2 }}>{s.value}</div>
      <div style={{ fontSize:12, color:"#999" }}>{s.sub}</div>
    </div>
  );

  const statsData = [
    { label:"Enrolled", value:children.length, sub:`${presentCount} present today`, color:"#1a73e8" },
    { label:"Staff", value:staff.length, sub:"Team members", color:"#0f9d58" },
    { label:"Outstanding", value:`$${totalOutstanding}`, sub:`${overdueInvoices.length} overdue`, color:overdueInvoices.length>0?"#e53935":"#0f9d58" },
    { label:"Open Incidents", value:incidents.filter(i=>!i.parentNotified).length, sub:"Need follow-up", color:"#f57c00" },
  ];

  const wOrder = widgetOrder || DEFAULT_WIDGET_ORDER;

  const renderWidget = (id) => {
    const hdr = (title) => (
      <div style={{fontWeight:600,fontSize:14,marginBottom:12,paddingBottom:10,borderBottom:"1px solid #f2f4f8",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        {title}{canDrag&&<span style={{fontSize:14,color:"#ccc",userSelect:"none"}}>⠿</span>}
      </div>
    );
    if (id==="stats") return (
      <div key="stats" style={{gridColumn:"1/-1",...wrapStyle("stats")}} draggable={canDrag} onDragStart={e=>onDragStart(e,"stats")} onDragOver={e=>onDragOver(e,"stats")} onDrop={e=>onDrop(e,"stats")}>
        {canDrag&&<div style={{fontSize:10,color:"#bbb",textAlign:"right",marginBottom:4}}>⠿ drag to reorder</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14}}>
          {statsData.map((s,i)=><StatCard key={i} s={s}/>)}
        </div>
      </div>
    );
    if (id==="attendance") return (
      <div key="attendance" style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",...wrapStyle("attendance")}} draggable={canDrag} onDragStart={e=>onDragStart(e,"attendance")} onDragOver={e=>onDragOver(e,"attendance")} onDrop={e=>onDrop(e,"attendance")}>
        {hdr("Today's Attendance")}
        {children.map(c=>{const att=todayAtt.find(a=>a.childId===c.id);const display=c.preferredName?`${c.preferredName} (${c.name})`:c.name;return(<div key={c.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid #f2f4f8"}}><div style={{display:"flex",alignItems:"center",gap:10}}><Avatar name={c.name} size={30}/><div><div style={{fontWeight:500,fontSize:13}}>{display}</div><div style={{color:"#999",fontSize:11}}>{c.room}</div></div></div><StatusPill status={att?.present?"present":"absent"}/></div>);})}
      </div>
    );
    if (id==="rooms") return (
      <div key="rooms" style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",...wrapStyle("rooms")}} draggable={canDrag} onDragStart={e=>onDragStart(e,"rooms")} onDragOver={e=>onDragOver(e,"rooms")} onDrop={e=>onDrop(e,"rooms")}>
        {hdr("Room Capacity")}
        {rooms.map(r=>{const cnt=children.filter(c=>c.room===r.name).length;return(<div key={r.id} style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,fontWeight:500}}>{r.name}</span><span style={{fontSize:12,color:"#888"}}>{cnt}/{r.capacity}</span></div><div style={{background:"#f0f4f8",borderRadius:4,height:5}}><div style={{background:r.color,borderRadius:4,height:5,width:`${Math.min(100,Math.round((cnt/r.capacity)*100))}%`}}/></div></div>);})}
      </div>
    );
    if (id==="overdue") return (
      <div key="overdue" style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",...wrapStyle("overdue")}} draggable={canDrag} onDragStart={e=>onDragStart(e,"overdue")} onDragOver={e=>onDragOver(e,"overdue")} onDrop={e=>onDrop(e,"overdue")}>
        {hdr("Overdue Invoices")}
        {overdueInvoices.length===0?<div style={{color:"#bbb",fontSize:13,textAlign:"center",padding:"14px 0"}}>No overdue invoices 🎉</div>
          :overdueInvoices.map(inv=><div key={inv.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f2f4f8"}}><div><div style={{fontWeight:500,fontSize:13}}>{inv.child}</div><div style={{color:"#999",fontSize:11}}>Due {inv.due}</div></div><span style={{color:"#e53935",fontWeight:700}}>{inv.amount}</span></div>)}
      </div>
    );
    if (id==="incidents_widget") return (
      <div key="incidents_widget" style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",...wrapStyle("incidents_widget")}} draggable={canDrag} onDragStart={e=>onDragStart(e,"incidents_widget")} onDragOver={e=>onDragOver(e,"incidents_widget")} onDrop={e=>onDrop(e,"incidents_widget")}>
        {hdr("Recent Incidents")}
        {incidents.length===0?<div style={{color:"#bbb",fontSize:13,textAlign:"center",padding:"14px 0"}}>No incidents on record</div>
          :incidents.slice(0,3).map(inc=><div key={inc.id} style={{padding:"8px 0",borderBottom:"1px solid #f2f4f8"}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}><span style={{fontWeight:500,fontSize:13}}>{inc.child}</span><span style={{fontSize:11,color:"#e65100",background:"#fff3e0",borderRadius:4,padding:"1px 6px"}}>{inc.type}</span></div><div style={{color:"#999",fontSize:11}}>{inc.date} · {inc.parentNotified?"✓ Notified":"⚠️ Needs follow-up"}</div></div>)}
      </div>
    );
    return null;
  };

  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <div style={{marginBottom:22,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f1f3d"}}>Dashboard</h1><p style={{margin:"4px 0 0",color:"#888",fontSize:13}}>Good morning! Today is {today}.</p></div>
        {canDrag&&<div style={{fontSize:12,color:"#888",background:"#f0f4f8",borderRadius:8,padding:"5px 12px",border:"1px solid #e0e8f4"}}>⠿ Drag widgets to rearrange</div>}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:18}}>
        {wOrder.map(id => renderWidget(id))}
      </div>
    </div>
  );
}

// ─── Children ─────────────────────────────────────────────────────────────────
function ChildrenModule({ children, allChildren, setChildren, parents, setParents, incidents, goToChildIncidents, goToChildBilling, setEmailModal, showNotification, roomNames, settings, globalFilters }) {
  const [search, setSearch]     = useState("");
  const [selected, setSelected] = useState(null);
  const [editing, setEditing]   = useState(null);
  const [adding, setAdding]     = useState(false);
  const [parentView, setParentView] = useState(false); // toggle to parent family view
  const [enrollFilter, setEnrollFilter] = useState("active");
  const blank = { name:"", preferredName:"", age:"", room:roomNames[0]||"", parent:"", parentEmail:"", email:"", phone:"", phones:[{label:"Primary",number:""}], allergies:"None", weeklyTuition:"", registrationFee:"", lateFee:"", billingCycle:"Weekly", notes:"" };
  const [form, setForm] = useState(blank);

  // Get all siblings (children sharing same parentEmail)
  const getSiblings = (child) => children.filter(c => c.parentEmail && c.parentEmail === child.parentEmail && c.id !== child.id);

  // Get parent account for a child
  const getParent = (child) => parents?.find(p => p.email === child.parentEmail);

  const filtered = children.filter(c =>
    c.name.toLowerCase().includes(search.toLowerCase()) ||
    c.parent.toLowerCase().includes(search.toLowerCase()) ||
    (c.preferredName||"").toLowerCase().includes(search.toLowerCase()) ||
    (c.parentEmail||"").toLowerCase().includes(search.toLowerCase())
  );

  // Group children by parentEmail for family view
  const familyGroups = filtered.reduce((acc, c) => {
    const key = c.parentEmail || c.email || `solo_${c.id}`;
    if (!acc[key]) acc[key] = [];
    acc[key].push(c);
    return acc;
  }, {});

  const saveAdd = () => {
    if (!form.name || !form.parent) return showNotification("Name and parent name required");
    // Duplicate check: same child name + same parent email
    const dupName = children.find(c => c.name.toLowerCase()===form.name.toLowerCase() && c.parentEmail===form.parentEmail);
    if (dupName) return showNotification(`⚠️ ${form.name} is already enrolled under this parent account`);
    // Auto-create or link parent account by email
    if (form.parentEmail) {
      const existingParent = parents?.find(p => p.email === form.parentEmail);
      if (!existingParent) {
        setParents(prev => [...(prev||[]), { id: `p${Date.now()}`, name: form.parent, email: form.parentEmail, phone: form.phones?.[0]?.number||"", relationship: "Parent" }]);
      }
    }
    setChildren([...children, { ...form, id: Date.now(), age: parseInt(form.age)||0, balance: 0, status: "active",
      weeklyTuition: parseFloat(form.weeklyTuition)||settings.tuitionRate,
      registrationFee: parseFloat(form.registrationFee)||settings.registrationFee,
      lateFee: parseFloat(form.lateFee)||settings.latePickupFee }]);
    setAdding(false); setForm(blank); showNotification(`${form.name} added`);
  };

  const saveEdit = () => {
    setChildren(children.map(c => c.id === editing.id ? { ...c, ...form,
      weeklyTuition: parseFloat(form.weeklyTuition)||c.weeklyTuition||settings.tuitionRate,
      registrationFee: parseFloat(form.registrationFee)||c.registrationFee||0,
      lateFee: parseFloat(form.lateFee)||c.lateFee||settings.latePickupFee } : c));
    setEditing(null); showNotification(`${form.name} updated`);
  };

  const openEdit = (c) => {
    setForm({ name:c.name, preferredName:c.preferredName||"", age:c.age, room:c.room, parent:c.parent, parentEmail:c.parentEmail||c.email||"", email:c.email,
      phone:c.phone||"",
      phones: c.phones||[{label:"Primary",number:c.phone||""}],
      allergies:c.allergies, weeklyTuition:c.weeklyTuition||settings.tuitionRate,
      registrationFee:c.registrationFee||"", lateFee:c.lateFee||settings.latePickupFee,
      billingCycle:c.billingCycle||"Weekly", notes:c.notes||"" });
    setEditing(c); setSelected(null);
  };

  const deleteChild = (id) => {
    setChildren(children.filter(c => c.id !== id));
    setSelected(null); showNotification("Child removed");
  };

  const handlePhotoUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setForm(f => ({ ...f, photo: ev.target.result }));
    reader.readAsDataURL(file);
  };

  const FieldGrid = () => (
    <div style={{display:"flex",flexDirection:"column",gap:0}}>
      {/* Photo Upload */}
      <div style={{display:"flex",alignItems:"center",gap:14,background:"#f8fafd",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
        <div style={{width:64,height:64,borderRadius:"50%",overflow:"hidden",background:"#e0e8f4",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:"2px solid #dde3ec"}}>
          {form.photo ? <img src={form.photo} alt="child" style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{fontSize:24,color:"#b0bec5"}}>📷</span>}
        </div>
        <div>
          <div style={{fontWeight:600,fontSize:13,color:"#0f1f3d",marginBottom:5}}>Profile Photo</div>
          <label style={{background:"#e8f0fe",color:"#1a73e8",borderRadius:7,padding:"5px 12px",fontSize:12,fontWeight:500,cursor:"pointer",display:"inline-block"}}>
            Upload Photo<input type="file" accept="image/*" onChange={handlePhotoUpload} style={{display:"none"}}/>
          </label>
          {form.photo && <button type="button" onClick={()=>setForm(f=>({...f,photo:null}))} style={{marginLeft:8,background:"#fce8e6",color:"#c62828",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>Remove</button>}
        </div>
      </div>
      {/* Basic Info */}
      <div style={{fontWeight:600,fontSize:12,color:"#0f1f3d",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #f0f2f5"}}>Child & Family Info</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        {[["Child's Full Name","name","text"],["Preferred/Nickname","preferredName","text"],["Age","age","number"],["Parent Name","parent","text"],["Parent Email (links siblings)","parentEmail","email"],["Contact Email","email","email"],["Allergies","allergies","text"]].map(([label,key,type]) => (
          <div key={key}>
            <label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>{label}</label>
            <input type={type} value={form[key]} onChange={e=>setForm({...form,[key]:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/>
          </div>
        ))}
        <div>
          <label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Room</label>
          <select value={form.room} onChange={e=>setForm({...form,room:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}>
            {roomNames.map(r=><option key={r}>{r}</option>)}
          </select>
        </div>
      </div>

      {/* Phone Numbers */}
      <div style={{marginBottom:16}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontWeight:600,fontSize:12,color:"#0f1f3d",textTransform:"uppercase",letterSpacing:"0.5px"}}>📱 Contact Phone Numbers</div>
          <button type="button" onClick={()=>setForm({...form,phones:[...(form.phones||[]),{label:"",number:""}]})} style={{background:"#e8f0fe",color:"#1a73e8",border:"none",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>+ Add Number</button>
        </div>
        {(form.phones||[]).map((p,i)=>(
          <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 32px",gap:8,marginBottom:8,alignItems:"center"}}>
            <input value={p.label} onChange={e=>{const ph=[...form.phones];ph[i]={...ph[i],label:e.target.value};setForm({...form,phones:ph});}} placeholder="Label (e.g. Mom, Dad)" style={{border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontFamily:"inherit",fontSize:13}}/>
            <input value={p.number} onChange={e=>{const ph=[...form.phones];ph[i]={...ph[i],number:e.target.value};setForm({...form,phones:ph,phone:i===0?e.target.value:form.phone});}} placeholder="254-555-0000" style={{border:"1.5px solid #e0e0e0",borderRadius:8,padding:"7px 10px",fontFamily:"inherit",fontSize:13}}/>
            {form.phones.length>1
              ? <button type="button" onClick={()=>setForm({...form,phones:form.phones.filter((_,j)=>j!==i)})} style={{background:"#fce8e6",color:"#c62828",border:"none",borderRadius:6,width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
              : <div/>
            }
          </div>
        ))}
      </div>

      {/* Fees */}
      <div style={{fontWeight:600,fontSize:12,color:"#0f1f3d",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:10,paddingBottom:6,borderBottom:"1px solid #f0f2f5"}}>💰 Fee Schedule</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
        <div>
          <label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Weekly Tuition ($)</label>
          <input type="number" value={form.weeklyTuition} onChange={e=>setForm({...form,weeklyTuition:e.target.value})} placeholder={`Default: $${settings.tuitionRate}`} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/>
        </div>
        <div>
          <label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Billing Cycle</label>
          <select value={form.billingCycle} onChange={e=>setForm({...form,billingCycle:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}>
            {["Weekly","Bi-Weekly","Monthly"].map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Registration Fee ($)</label>

        </div>

          {(() => { const childInc = incidents.filter(i => i.childId === selected.id); return childInc.length > 0 && (

function LateFeeCell({ fee, mins, blocks, waived, customFee, onUpdate }) {
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState("");
  const displayFee = customFee != null ? customFee : fee;

  if (editing) return (
    <div style={{display:"flex",flexDirection:"column",gap:4}}>
      <input
        type="number"
        value={editVal}
        onChange={e => setEditVal(e.target.value)}
        placeholder={`$${displayFee}`}
        style={{width:70,border:"1.5px solid #1a73e8",borderRadius:6,padding:"3px 6px",fontFamily:"inherit",fontSize:12}}
        autoFocus
      />
      <div style={{display:"flex",gap:3}}>
        <button onClick={() => { onUpdate({ customFee: parseFloat(editVal)||0, feeWaived: false }); setEditing(false); }}
          style={{background:"#e8f0fe",color:"#1a73e8",border:"none",borderRadius:5,padding:"2px 7px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>Save</button>
        <button onClick={() => setEditing(false)}
          style={{background:"#f0f4f8",color:"#666",border:"none",borderRadius:5,padding:"2px 7px",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>✕</button>
