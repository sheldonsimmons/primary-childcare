                </div>
              </div>
            ))}
          </div>

          {uploading&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
              <div style={{background:"#fff",borderRadius:14,width:460,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <div style={{fontWeight:700,fontSize:16,color:"#0f1f3d"}}>Upload Document</div>
                  <button onClick={()=>setUploading(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#888"}}>×</button>
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:12}}>
                  <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Document Name</label><input value={uploadForm.name} onChange={e=>setUploadForm({...uploadForm,name:e.target.value})} placeholder="e.g. Immunization Records 2026" style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/></div>
                  <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Category</label>
                    <select value={uploadForm.category} onChange={e=>setUploadForm({...uploadForm,category:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}>
                      {docCategories.map(c=><option key={c}>{c}</option>)}
                    </select>
                  </div>
                  <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Expiration Date (optional)</label><input type="date" value={uploadForm.expires} onChange={e=>setUploadForm({...uploadForm,expires:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/></div>
                  <div style={{background:"#f8fafd",borderRadius:8,border:"2px dashed #dde3ec",padding:"20px",textAlign:"center",color:"#aaa",fontSize:13}}>📎 Click to attach file (PDF, JPG, PNG)<br/><span style={{fontSize:11}}>In production this connects to cloud storage</span></div>
                </div>
                <div style={{marginTop:16,display:"flex",justifyContent:"flex-end",gap:8}}>
                  <Btn label="Cancel" onClick={()=>setUploading(false)} secondary/>
                  <Btn label="Upload Document" onClick={addDoc}/>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── Communication Log ────────────────────────────────────────────────────────
function CommLogModule({ commLog, children, globalFilters }) {
  const [filter, setFilter] = useState("all");
  const [search, setSearch] = useState("");
  const typeColor = { Email: ["#e8f0fe","#1a73e8"], SMS: ["#e8f5e9","#2e7d32"], Portal: ["#f3e5f5","#7b1fa2"] };
  const filtered = (commLog||[]).filter(m => {
    const matchType = filter==="all" || m.type===filter;
    const matchSearch = !search || m.child?.toLowerCase().includes(search.toLowerCase()) || m.subject?.toLowerCase().includes(search.toLowerCase()) || m.to?.toLowerCase().includes(search.toLowerCase());
    const matchChild = !globalFilters?.childId || (() => { const c = children.find(x=>x.id===globalFilters.childId); return c && m.child===c.name; })();
    const matchDate = !globalFilters?.dateFrom || (m.date >= globalFilters.dateFrom && (!globalFilters.dateTo || m.date <= globalFilters.dateTo));
    return matchType && matchSearch && matchChild && matchDate;
  });
  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f1f3d"}}>Communication Log</h1>
          <p style={{margin:"4px 0 0",color:"#888",fontSize:13}}>{(commLog||[]).length} messages sent</p>
        </div>
        <div style={{background:"#fff8e1",border:"1.5px solid #ffe082",borderRadius:9,padding:"8px 14px",fontSize:12,color:"#795548",maxWidth:280}}>
          📋 All emails, texts, and portal messages are automatically logged here when sent.
        </div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
        {[["all","All"],["Email","Email"],["SMS","SMS"],["Portal","Portal"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:"5px 15px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontFamily:"inherit",fontSize:12.5,fontWeight:500,background:filter===v?"#0f1f3d":"#fff",color:filter===v?"#fff":"#666",borderColor:filter===v?"#0f1f3d":"#dde3ec"}}>{l}</button>
        ))}
        <div style={{flex:1,minWidth:200}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by child, subject, or recipient..." style={{width:"100%",border:"1.5px solid #e0e8f4",borderRadius:8,padding:"7px 12px",fontFamily:"inherit",fontSize:13,background:"#fff",boxSizing:"border-box"}}/>
        </div>
      </div>

      {filtered.length===0 && <div style={{textAlign:"center",padding:"60px 0",color:"#ccc",background:"#fff",borderRadius:12}}>No messages match your filter.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {filtered.map(msg=>{
          const [bg,tc] = typeColor[msg.type]||["#f5f5f5","#666"];
          const child = children.find(c=>c.name===msg.child);
          return (
            <div key={msg.id} style={{background:"#fff",borderRadius:11,padding:"14px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)",display:"flex",gap:14,alignItems:"flex-start"}}>
              <div style={{width:38,height:38,borderRadius:9,background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>
                {msg.type==="Email"?"📧":msg.type==="SMS"?"💬":"🔔"}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:2}}>
                  <span style={{fontWeight:600,fontSize:13.5,color:"#0f1f3d"}}>{msg.subject}</span>
                  <span style={{background:bg,color:tc,borderRadius:5,padding:"1px 8px",fontSize:11,fontWeight:600}}>{msg.type}</span>
                </div>
                <div style={{fontSize:12,color:"#666",marginBottom:4}}>To: <strong>{msg.to}</strong> {msg.child && <span>· {msg.child}</span>}</div>
                <div style={{fontSize:12,color:"#888",lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{msg.body}</div>
              </div>
              <div style={{textAlign:"right",flexShrink:0}}>
                <div style={{fontSize:11,color:"#999",whiteSpace:"nowrap"}}>{msg.date}</div>
                <div style={{fontSize:11,color:"#bbb"}}>{msg.time}</div>
                <div style={{fontSize:11,color:"#888",marginTop:4}}>by {msg.sentBy}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Waitlist ─────────────────────────────────────────────────────────────────
function WaitlistModule({ waitlist, setWaitlist, showNotification, rooms }) {
  const [adding, setAdding] = useState(false);
  const [blank] = useState({ childName:"", dob:"", parentName:"", parentEmail:"", parentPhone:"", desiredRoom:"", desiredStart:"", notes:"", priority:"normal", status:"waiting" });
  const [form, setForm] = useState(blank);
  const [expandId, setExpandId] = useState(null);

  const save = () => {
    if (!form.childName.trim() || !form.parentName.trim()) return showNotification("Child and parent name required");
    setWaitlist(prev=>[...prev,{...form,id:"WL-"+Date.now(),addedDate:new Date().toISOString().split("T")[0]}]);
    setAdding(false); setForm(blank);
    showNotification(`${form.childName} added to waitlist`);
  };
  const promote = (entry) => {
    showNotification(`${entry.childName} promoted — add them in Children & Families!`);
    setWaitlist(prev=>prev.map(e=>e.id===entry.id?{...e,status:"promoted"}:e));
  };
  const remove = (id) => { setWaitlist(prev=>prev.filter(e=>e.id!==id)); showNotification("Removed from waitlist"); };

  const statusColors = { waiting:["#fff3e0","#e65100"], contacted:["#e8f0fe","#1a73e8"], promoted:["#e6f4ea","#2e7d32"], declined:["#fce8e6","#c62828"] };
  const priorityIcon = { high:"🔴", normal:"🟡", low:"🟢" };
  const waiting = waitlist.filter(e=>e.status==="waiting").length;
  const contacted = waitlist.filter(e=>e.status==="contacted").length;

  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f1f3d"}}>Waitlist</h1>
          <p style={{margin:"4px 0 0",color:"#888",fontSize:13}}>{waiting} waiting · {contacted} contacted · {waitlist.length} total</p>
        </div>
        <Btn label="+ Add to Waitlist" onClick={()=>setAdding(true)}/>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
        {[["Waiting",waiting,"#e65100","#fff3e0"],["Contacted",contacted,"#1a73e8","#e8f0fe"],["Promoted",waitlist.filter(e=>e.status==="promoted").length,"#2e7d32","#e6f4ea"],["Total",waitlist.length,"#555","#f5f5f5"]].map(([l,v,c,bg])=>(
          <div key={l} style={{background:bg,borderRadius:10,padding:"12px 16px"}}>
            <div style={{fontSize:11,color:c,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.4px"}}>{l}</div>
            <div style={{fontSize:22,fontWeight:700,color:c,marginTop:4}}>{v}</div>
          </div>
        ))}
      </div>

      {waitlist.length===0 && <div style={{textAlign:"center",padding:"60px 0",color:"#ccc",background:"#fff",borderRadius:12}}>No one on the waitlist.</div>}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {waitlist.map(entry=>{
          const [sbg,sc]=statusColors[entry.status]||["#f5f5f5","#666"];
          const isExpanded = expandId===entry.id;
          return (
            <div key={entry.id} style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden",border:"1.5px solid #eaeef4"}}>
              <div style={{padding:"14px 18px",display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onClick={()=>setExpandId(isExpanded?null:entry.id)}>
                <div style={{width:42,height:42,borderRadius:10,background:"#f0f4f8",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{priorityIcon[entry.priority]}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:14,color:"#0f1f3d"}}>{entry.childName}</div>
                  <div style={{fontSize:12,color:"#666"}}>{entry.parentName} · {entry.parentPhone}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#999"}}>Desired Start</div>
                  <div style={{fontWeight:600,fontSize:13}}>{entry.desiredStart||"—"}</div>
                </div>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:11,color:"#999"}}>Room</div>
                  <div style={{fontWeight:600,fontSize:13,color:"#1a73e8"}}>{entry.desiredRoom||"Any"}</div>
                </div>
                <span style={{background:sbg,color:sc,borderRadius:6,padding:"3px 10px",fontSize:11.5,fontWeight:600}}>{entry.status.charAt(0).toUpperCase()+entry.status.slice(1)}</span>
                <div style={{fontSize:16,color:"#bbb"}}>{isExpanded?"▲":"▼"}</div>
              </div>
              {isExpanded && (
                <div style={{padding:"0 18px 16px",borderTop:"1px solid #f2f4f8"}}>
                  <div className="grid-3col" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginTop:12,marginBottom:12}}>
                    {[["Date of Birth",entry.dob||"—"],["Email",entry.parentEmail||"—"],["Added",entry.addedDate]].map(([l,v])=>(
                      <div key={l}><div style={{fontSize:11,color:"#999"}}>{l}</div><div style={{fontWeight:500,fontSize:13}}>{v}</div></div>
                    ))}
                  </div>
                  {entry.notes && <div style={{background:"#f8fafd",borderRadius:8,padding:"8px 12px",fontSize:13,color:"#555",marginBottom:12}}>📝 {entry.notes}</div>}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {["waiting","contacted","declined"].map(s=>(
                      <button key={s} onClick={()=>{setWaitlist(prev=>prev.map(e=>e.id===entry.id?{...e,status:s}:e));showNotification("Status updated");}} style={{padding:"5px 12px",borderRadius:7,border:"1.5px solid #dde3ec",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:500,background:entry.status===s?"#0f1f3d":"#fff",color:entry.status===s?"#fff":"#555"}}>
                        {s.charAt(0).toUpperCase()+s.slice(1)}
                      </button>
                    ))}
                    <button onClick={()=>promote(entry)} style={{padding:"5px 14px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:600,background:"#e6f4ea",color:"#2e7d32"}}>✓ Promote to Enrolled</button>
                    <button onClick={()=>remove(entry.id)} style={{padding:"5px 12px",borderRadius:7,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:500,background:"#fce8e6",color:"#c62828",marginLeft:"auto"}}>Remove</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {adding && (
        <Modal title="Add to Waitlist" onClose={()=>setAdding(false)} wide>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[["Child's Full Name","childName","text"],["Date of Birth","dob","date"],["Parent/Guardian Name","parentName","text"],["Parent Email","parentEmail","email"],["Parent Phone","parentPhone","text"]].map(([l,k,t])=>(
                <div key={k}><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>{l}</label><input type={t} value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/></div>
              ))}
              <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Desired Room</label><select value={form.desiredRoom} onChange={e=>setForm({...form,desiredRoom:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}><option value="">Any</option>{rooms.map(r=><option key={r.id}>{r.name}</option>)}</select></div>
              <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Desired Start</label><input type="date" value={form.desiredStart} onChange={e=>setForm({...form,desiredStart:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/></div>
              <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Priority</label><select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}>{["high","normal","low"].map(p=><option key={p}>{p}</option>)}</select></div>
            </div>
            <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Notes</label><textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={3} placeholder="Subsidy info, tour date, sibling already enrolled, etc." style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13,resize:"vertical"}}/></div>
          </div>
          <div style={{marginTop:16,display:"flex",justifyContent:"flex-end",gap:8}}><Btn label="Cancel" onClick={()=>setAdding(false)} secondary/><Btn label="Add to Waitlist" onClick={save}/></div>
        </Modal>
      )}
    </div>
  );
}

// ─── Health Records / Immunizations ─────────────────────────────────────────
function HealthRecordsModule({ children, immunizations, setImmunizations, showNotification }) {
  const [selectedChild, setSelectedChild] = useState(null);
  const [addingRecord, setAddingRecord] = useState(false);
  const [recForm, setRecForm] = useState({ vaccine:"DTaP", doses:1, required:4, lastDate:"", nextDue:"", status:"current" });

  const VACCINES = ["DTaP","Polio (IPV)","MMR","Varicella","Hep B","Hib","PCV13","Hep A","Influenza","COVID-19","Other"];
  const statusMeta = { current:["#e6f4ea","#2e7d32","✓ Current"], "due-soon":["#fff3e0","#e65100","⏰ Due Soon"], overdue:["#fce8e6","#c62828","🚨 Overdue"] };

  const childRecords = selectedChild ? (immunizations[selectedChild.id]||[]) : [];
  const overdueCount = children.reduce((sum,c)=>{
    return sum + (immunizations[c.id]||[]).filter(r=>r.status==="overdue").length;
  }, 0);
  const dueSoonCount = children.reduce((sum,c)=>{
    return sum + (immunizations[c.id]||[]).filter(r=>r.status==="due-soon").length;
  }, 0);

  const saveRecord = () => {
    const updated = { ...immunizations, [selectedChild.id]: [...(immunizations[selectedChild.id]||[]), { ...recForm, id:"IMM-"+Date.now(), doses:parseInt(recForm.doses), required:parseInt(recForm.required) }] };
    setImmunizations(updated);
    setAddingRecord(false);
    setRecForm({ vaccine:"DTaP", doses:1, required:4, lastDate:"", nextDue:"", status:"current" });
    showNotification("Record added");
  };

  return (
    <div style={{animation:"fadeIn 0.4s ease"}}>
      <div style={{marginBottom:20}}>
        <h1 style={{margin:0,fontSize:22,fontWeight:700,color:"#0f1f3d"}}>Health Records</h1>
        <p style={{margin:"4px 0 0",color:"#888",fontSize:13}}>Immunization tracking per Texas DSHS requirements</p>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        {[["🚨 Overdue",overdueCount,"#c62828","#fce8e6"],["⏰ Due Soon",dueSoonCount,"#e65100","#fff3e0"],["✓ Up to Date",children.length-[...new Set(children.filter(c=>(immunizations[c.id]||[]).some(r=>r.status==="overdue"||r.status==="due-soon")).map(c=>c.id))].length,"#2e7d32","#e6f4ea"]].map(([l,v,c,bg])=>(
          <div key={l} style={{background:bg,borderRadius:10,padding:"14px 18px"}}>
            <div style={{fontSize:12,fontWeight:600,color:c}}>{l}</div>
            <div style={{fontSize:28,fontWeight:700,color:c,marginTop:2}}>{v}</div>
            <div style={{fontSize:11,color:c,opacity:0.7}}>children</div>
          </div>
        ))}
      </div>

      {!selectedChild ? (
        <div>
          <div style={{fontWeight:600,fontSize:14,color:"#0f1f3d",marginBottom:12}}>Select a child to view their immunization records</div>
          <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:10}}>
            {children.map(c=>{
              const recs = immunizations[c.id]||[];
              const overdues = recs.filter(r=>r.status==="overdue").length;
              const dueSoons = recs.filter(r=>r.status==="due-soon").length;
              const border = overdues>0?"#ef9a9a":dueSoons>0?"#ffcc80":"#e0e8f4";
              return (
                <div key={c.id} onClick={()=>setSelectedChild(c)} style={{background:"#fff",borderRadius:11,padding:"14px 16px",border:`1.5px solid ${border}`,cursor:"pointer",display:"flex",gap:12,alignItems:"center",transition:"box-shadow 0.15s"}}>
                  <Avatar name={c.name} size={42} colorIndex={c.id} photo={c.photo}/>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13.5}}>{c.name}</div>
                    <div style={{fontSize:12,color:"#888"}}>{c.room} · {recs.length} records</div>
                    <div style={{display:"flex",gap:5,marginTop:4}}>
                      {overdues>0&&<span style={{background:"#fce8e6",color:"#c62828",borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:600}}>{overdues} overdue</span>}
                      {dueSoons>0&&<span style={{background:"#fff3e0",color:"#e65100",borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:600}}>{dueSoons} due soon</span>}
                      {overdues===0&&dueSoons===0&&recs.length>0&&<span style={{background:"#e6f4ea",color:"#2e7d32",borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:600}}>✓ Up to date</span>}
                      {recs.length===0&&<span style={{background:"#f5f5f5",color:"#888",borderRadius:5,padding:"1px 7px",fontSize:11}}>No records</span>}
                    </div>
                  </div>
                  <span style={{fontSize:16,color:"#bbb"}}>›</span>
                </div>
              );
            })}
          </div>
        </div>
      ) : (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button onClick={()=>setSelectedChild(null)} style={{background:"#f0f4f8",border:"none",borderRadius:7,padding:"6px 12px",cursor:"pointer",fontFamily:"inherit",fontSize:13,color:"#555"}}>← Back</button>
            <Avatar name={selectedChild.name} size={36} colorIndex={selectedChild.id} photo={selectedChild.photo}/>
            <div>
              <div style={{fontWeight:700,fontSize:15}}>{selectedChild.name}</div>
              <div style={{fontSize:12,color:"#888"}}>{selectedChild.room} · Age {selectedChild.age}</div>
            </div>
            <Btn label="+ Add Record" onClick={()=>setAddingRecord(true)}/>
          </div>

          {childRecords.length===0 && <div style={{textAlign:"center",padding:"40px 0",color:"#ccc",background:"#fff",borderRadius:12}}>No immunization records yet. Add one above.</div>}
          <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr style={{background:"#f8fafd"}}>{["Vaccine","Doses Given","Required","Last Admin","Next Due","Status"].map(h=><th key={h} style={{padding:"11px 16px",textAlign:"left",fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>{h}</th>)}</tr></thead>
              <tbody>
                {childRecords.map(rec=>{
                  const [sbg,sc,sl] = statusMeta[rec.status]||["#f5f5f5","#666","Unknown"];
                  return (
                    <tr key={rec.id} style={{borderTop:"1px solid #f2f4f8"}}>
                      <td style={{padding:"12px 16px",fontWeight:600,fontSize:13}}>{rec.vaccine}</td>
                      <td style={{padding:"12px 16px",fontSize:13}}>{rec.doses}</td>
                      <td style={{padding:"12px 16px",fontSize:13,color:"#888"}}>{rec.required}</td>
                      <td style={{padding:"12px 16px",fontSize:13,color:"#666"}}>{rec.lastDate||"—"}</td>
                      <td style={{padding:"12px 16px",fontSize:13,color:rec.nextDue?"#e65100":"#bbb"}}>{rec.nextDue||"—"}</td>
                      <td style={{padding:"12px 16px"}}><span style={{background:sbg,color:sc,borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:600}}>{sl}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {addingRecord && selectedChild && (
        <Modal title={`Add Immunization — ${selectedChild.name}`} onClose={()=>setAddingRecord(false)}>
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Vaccine</label><select value={recForm.vaccine} onChange={e=>setRecForm({...recForm,vaccine:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}>{VACCINES.map(v=><option key={v}>{v}</option>)}</select></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Doses Given</label><input type="number" value={recForm.doses} onChange={e=>setRecForm({...recForm,doses:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/></div>
              <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Total Required</label><input type="number" value={recForm.required} onChange={e=>setRecForm({...recForm,required:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/></div>
              <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Last Admin Date</label><input type="date" value={recForm.lastDate} onChange={e=>setRecForm({...recForm,lastDate:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/></div>
              <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Next Due Date</label><input type="date" value={recForm.nextDue} onChange={e=>setRecForm({...recForm,nextDue:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}/></div>
            </div>
            <div><label style={{fontSize:12,color:"#666",display:"block",marginBottom:4}}>Status</label><select value={recForm.status} onChange={e=>setRecForm({...recForm,status:e.target.value})} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13}}>{["current","due-soon","overdue"].map(s=><option key={s} value={s}>{s}</option>)}</select></div>
          </div>
          <div style={{marginTop:16,display:"flex",justifyContent:"flex-end",gap:8}}><Btn label="Cancel" onClick={()=>setAddingRecord(false)} secondary/><Btn label="Save Record" onClick={saveRecord}/></div>
        </Modal>
      )}
    </div>
  );
}

// ─── Sign-In Sheet / Printable View ─────────────────────────────────────────

  const [filterRoom, setFilterRoom] = useState("all");

          <thead><tr style="background:#f8f9fa">

}

function EmployeePortal({ children, staff, attendance, setAttendance, showNotification }) {
  const today = "2026-03-03";
  const [activeEmployee, setActiveEmployee] = useState(staff[0]);
  const [portalTab, setPortalTab] = useState("dashboard");
  const [shifts, setShifts] = useState(mockEmployeeShifts);
  const [actLogs, setActLogs] = useState(mockLogs2);
  const [editingLog, setEditingLog] = useState(null);
  const [logForm, setLogForm] = useState(null);
  const [clockConfirm, setClockConfirm] = useState(null);

  const now = () => new Date().toTimeString().slice(0, 5);

  // Get current shift for today
  const myShifts = shifts[activeEmployee?.id] || [];
  const todayShift = myShifts.find(s => s.date === today);
  const isClockedIn = todayShift && todayShift.clockIn && !todayShift.clockOut;

  const clockIn = () => {
    const newShift = { date: today, clockIn: now(), clockOut: null, room: activeEmployee.room, hours: null };
    setShifts(prev => ({ ...prev, [activeEmployee.id]: [newShift, ...(prev[activeEmployee.id]||[]).filter(s=>s.date!==today)] }));
    showNotification(`${activeEmployee.name} clocked in at ${now()}`);
    setClockConfirm(null);
  };

  const clockOut = () => {
    const cin = todayShift?.clockIn;
    const cout = now();
    let hours = null;
    if (cin) {
      const [sh,sm] = cin.split(":").map(Number);
      const [eh,em] = cout.split(":").map(Number);
      hours = Math.round(((eh*60+em)-(sh*60+sm))/60*10)/10;
    }
    setShifts(prev => ({
      ...prev,
      [activeEmployee.id]: (prev[activeEmployee.id]||[]).map(s => s.date===today ? {...s, clockOut:cout, hours} : s)
    }));
    showNotification(`${activeEmployee.name} clocked out · ${hours}h logged`);
    setClockConfirm(null);
  };

  // Children in this employee's room
  const myChildren = children.filter(c => c.room === activeEmployee?.room || activeEmployee?.room === "All");

  // Activity log helpers
  const getLog = (childId) => actLogs[today]?.[childId] || { meals:[], naps:[], diapers:[], mood:"🙂 Good", notes:"" };

  const openLogEdit = (child) => {
    setEditingLog(child);
    setLogForm(JSON.parse(JSON.stringify(getLog(child.id))));
  };

  const saveLog = () => {
    setActLogs(prev => ({ ...prev, [today]: { ...(prev[today]||{}), [editingLog.id]: { ...logForm, loggedBy: activeEmployee.name, loggedAt: now() } } }));
    setEditingLog(null);
    showNotification(`Log saved for ${editingLog.name}`);
  };

  const addMeal   = () => setLogForm(f => ({...f, meals:[...f.meals,{time:now(),type:"Snack",food:"",amount:"All"}]}));
  const addNap    = () => setLogForm(f => ({...f, naps:[...f.naps,{start:now(),end:""}]}));
  const addDiaper = () => setLogForm(f => ({...f, diapers:[...f.diapers,{time:now(),type:"Wet"}]}));

  const moodOpts   = ["😄 Happy","🙂 Good","😐 Neutral","😟 Fussy","😢 Upset","🤒 Sick"];
  const amountOpts = ["All","Most","Some","Little","None"];
  const mealTypes  = ["Breakfast","Morning Snack","Lunch","Afternoon Snack","Dinner"];

  // Attendance helpers for employee view
  const dayAtt = attendance[today] || myChildren.map(c=>({childId:c.id,checkIn:null,checkOut:null,present:false}));
  const checkInChild = (childId) => {
    const base = dayAtt.length ? [...dayAtt] : myChildren.map(c=>({childId:c.id,checkIn:null,checkOut:null,present:false}));
    const updated = base.map(a => a.childId===childId ? {...a,present:true,checkIn:now(),checkOut:null} : a);
    setAttendance(prev => ({...prev,[today]:updated}));
    showNotification("Child checked in");
  };
  const checkOutChild = (childId) => {
    const updated = dayAtt.map(a => a.childId===childId ? {...a,present:false,checkOut:now()} : a);
    setAttendance(prev => ({...prev,[today]:updated}));
    showNotification("Child checked out");
  };

  const weekHours = myShifts.filter(s=>s.hours).reduce((s,x)=>s+x.hours,0);

    {id:"dashboard", label:"🏠 My Dashboard"},

                          <div key={child.id} style={{background:"#fff",borderRadius:10,padding:"16px 18px",border:"1.5px solid #eaeef4"}}>
                            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                              <div style={{display:"flex",alignItems:"center",gap:10}}>
                                <Avatar name={child.name} size={36}/>
                                <div><div style={{fontWeight:600,fontSize:14}}>{child.name}</div><div style={{fontSize:11,color:"#888"}}>{log?`Logged · ${log.mood}`:"Not logged yet"}</div></div>
                              </div>
                              <button onClick={()=>openLogEdit(child)} style={{background:log?"#f3e5f5":"#0f1f3d",color:log?"#7b1fa2":"#fff",border:"none",borderRadius:7,padding:"6px 14px",fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>
                                {log?"✏️ Edit":"+ Log"}
                              </button>
                            </div>
                            {log&&(
                              <div style={{fontSize:12.5,color:"#666"}}>
                                <div style={{marginBottom:3}}>🍽 {log.meals.length} meal{log.meals.length!==1?"s":""} logged</div>
                                <div style={{marginBottom:3}}>😴 {log.naps.length>0?log.naps.map(n=>`${n.start}–${n.end}`).join(", "):"No nap"}</div>
                                {log.diapers.length>0&&<div style={{marginBottom:3}}>🧷 {log.diapers.length} diaper change{log.diapers.length!==1?"s":""}</div>}
                                {log.notes&&<div style={{fontStyle:"italic",color:"#888",marginTop:4}}>&ldquo;{log.notes}&rdquo;</div>}
                                {log.loggedBy&&<div style={{fontSize:11,color:"#aaa",marginTop:6}}>by {log.loggedBy} at {log.loggedAt}</div>}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ) : (
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
                      <button onClick={()=>setEditingLog(null)} style={{background:"#f0f4f8",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>← Back</button>
                      <div style={{fontWeight:700,fontSize:15,color:"#0f1f3d"}}>Activity Log — {editingLog.name} · {today}</div>
                    </div>

                    {/* Mood */}
                    <div style={{marginBottom:18}}>
                      <div style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:8}}>Mood</div>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                        {moodOpts.map(m=>(
                          <button key={m} onClick={()=>setLogForm({...logForm,mood:m})} style={{padding:"6px 12px",borderRadius:20,border:"1.5px solid",cursor:"pointer",fontFamily:"inherit",fontSize:13,background:logForm.mood===m?"#0f1f3d":"#fff",color:logForm.mood===m?"#fff":"#555",borderColor:logForm.mood===m?"#0f1f3d":"#dde3ec"}}>{m}</button>
                        ))}
                      </div>
                    </div>

                    {/* Meals */}
                    <div style={{marginBottom:18}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#666"}}>🍽 Meals</div>
                        <button onClick={addMeal} style={{background:"#e8f0fe",color:"#1a73e8",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ Add Meal</button>
                      </div>
                      {logForm.meals.map((m,i)=>(
                        <div key={i} style={{display:"grid",gridTemplateColumns:"80px 120px 1fr 80px 28px",gap:8,marginBottom:8,alignItems:"center"}}>
                          <input type="time" value={m.time} onChange={e=>{const meals=[...logForm.meals];meals[i]={...m,time:e.target.value};setLogForm({...logForm,meals});}} style={{border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}/>
                          <select value={m.type} onChange={e=>{const meals=[...logForm.meals];meals[i]={...m,type:e.target.value};setLogForm({...logForm,meals});}} style={{border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}>
                            {mealTypes.map(t=><option key={t}>{t}</option>)}
                          </select>
                          <input value={m.food} onChange={e=>{const meals=[...logForm.meals];meals[i]={...m,food:e.target.value};setLogForm({...logForm,meals});}} placeholder="Food served" style={{border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}/>
                          <select value={m.amount} onChange={e=>{const meals=[...logForm.meals];meals[i]={...m,amount:e.target.value};setLogForm({...logForm,meals});}} style={{border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}>
                            {amountOpts.map(a=><option key={a}>{a}</option>)}
                          </select>
                          <button onClick={()=>setLogForm({...logForm,meals:logForm.meals.filter((_,j)=>j!==i)})} style={{background:"#fce8e6",color:"#c62828",border:"none",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>×</button>
                        </div>
                      ))}
                    </div>

                    {/* Naps */}
                    <div style={{marginBottom:18}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#666"}}>😴 Naps</div>
                        <button onClick={addNap} style={{background:"#f3e5f5",color:"#7b1fa2",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ Add Nap</button>
                      </div>
                      {logForm.naps.map((n,i)=>(
                        <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 28px",gap:8,marginBottom:8,alignItems:"end"}}>
                          <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>Start</label><input type="time" value={n.start} onChange={e=>{const naps=[...logForm.naps];naps[i]={...n,start:e.target.value};setLogForm({...logForm,naps});}} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}/></div>
                          <div><label style={{fontSize:11,color:"#999",display:"block",marginBottom:3}}>End</label><input type="time" value={n.end} onChange={e=>{const naps=[...logForm.naps];naps[i]={...n,end:e.target.value};setLogForm({...logForm,naps});}} style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}/></div>
                          <button onClick={()=>setLogForm({...logForm,naps:logForm.naps.filter((_,j)=>j!==i)})} style={{background:"#fce8e6",color:"#c62828",border:"none",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>×</button>
                        </div>
                      ))}
                    </div>

                    {/* Diapers */}
                    <div style={{marginBottom:18}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#666"}}>🧷 Diapers</div>
                        <button onClick={addDiaper} style={{background:"#e8f0fe",color:"#1a73e8",border:"none",borderRadius:6,padding:"4px 10px",fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ Add</button>
                      </div>
                      {logForm.diapers.map((d,i)=>(
                        <div key={i} style={{display:"grid",gridTemplateColumns:"100px 110px 28px",gap:8,marginBottom:8,alignItems:"center"}}>
                          <input type="time" value={d.time} onChange={e=>{const diapers=[...logForm.diapers];diapers[i]={...d,time:e.target.value};setLogForm({...logForm,diapers});}} style={{border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}/>
                          <select value={d.type} onChange={e=>{const diapers=[...logForm.diapers];diapers[i]={...d,type:e.target.value};setLogForm({...logForm,diapers});}} style={{border:"1.5px solid #e0e0e0",borderRadius:7,padding:"6px 8px",fontFamily:"inherit",fontSize:12}}>
                            {["Wet","BM","Dry","Both"].map(t=><option key={t}>{t}</option>)}
                          </select>
                          <button onClick={()=>setLogForm({...logForm,diapers:logForm.diapers.filter((_,j)=>j!==i)})} style={{background:"#fce8e6",color:"#c62828",border:"none",borderRadius:6,width:28,height:28,cursor:"pointer",fontSize:14}}>×</button>
                        </div>
                      ))}
                    </div>

                    {/* Notes */}
                    <div style={{marginBottom:20}}>
                      <div style={{fontSize:12,fontWeight:600,color:"#666",marginBottom:6}}>📝 Teacher Notes (sent to parents)</div>
                      <textarea value={logForm.notes} onChange={e=>setLogForm({...logForm,notes:e.target.value})} rows={3} placeholder="Share highlights, milestones, or anything parents should know..." style={{width:"100%",border:"1.5px solid #e0e0e0",borderRadius:8,padding:"8px 10px",fontFamily:"inherit",fontSize:13,resize:"vertical"}}/>
                    </div>

                    <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
                      <Btn label="Cancel" onClick={()=>setEditingLog(null)} secondary/>
                      <Btn label="💾 Save Activity Log" onClick={saveLog}/>
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* ── Timesheet ── */}
            {portalTab==="timesheet" && (
              <div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                  <div style={{fontWeight:600,fontSize:15,color:"#0f1f3d"}}>My Timesheet</div>
                  <div style={{background:"#f0f7ff",borderRadius:8,padding:"8px 16px",fontSize:13,color:"#1a73e8",fontWeight:600}}>Week Total: {weekHours}h</div>
                </div>
                <div style={{background:"#fff",borderRadius:12,overflow:"hidden",border:"1.5px solid #eaeef4"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead>
                      <tr style={{background:"#f8fafd"}}>
                        {["Date","Room","Clock In","Clock Out","Hours","Status"].map(h=>(
                          <th key={h} style={{padding:"11px 14px",textAlign:"left",fontSize:11,fontWeight:600,color:"#888",textTransform:"uppercase",letterSpacing:"0.5px"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {myShifts.map((s,i)=>(
                        <tr key={i} style={{borderTop:"1px solid #f2f4f8",background:s.date===today?"#fffde7":"transparent"}}>
                          <td style={{padding:"11px 14px",fontSize:13,fontWeight:s.date===today?600:400}}>{s.date}{s.date===today&&<span style={{marginLeft:6,background:"#fff9c4",color:"#f9a825",borderRadius:5,padding:"1px 7px",fontSize:11,fontWeight:600}}>Today</span>}</td>
                          <td style={{padding:"11px 14px",fontSize:13,color:"#555"}}>{s.room}</td>
                          <td style={{padding:"11px 14px",fontSize:13,fontWeight:500}}>{s.clockIn}</td>
                          <td style={{padding:"11px 14px",fontSize:13,color:s.clockOut?"#333":"#0f9d58",fontWeight:s.clockOut?400:500}}>{s.clockOut||"Still clocked in"}</td>
                          <td style={{padding:"11px 14px",fontSize:13,fontWeight:600,color:s.hours?"#0f1f3d":"#aaa"}}>{s.hours?s.hours+"h":"—"}</td>
                          <td style={{padding:"11px 14px"}}>
                            <span style={{background:s.clockOut?"#e6f4ea":s.clockIn?"#fff9c4":"#f5f5f5",color:s.clockOut?"#2e7d32":s.clockIn?"#f9a825":"#999",borderRadius:6,padding:"3px 10px",fontSize:11.5,fontWeight:600}}>
                              {s.clockOut?"Complete":s.clockIn?"In Progress":"No Show"}
                            </span>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}

          </div>
        </div>
      )}

      {/* Clock confirm modal */}
      {clockConfirm && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <div style={{background:"#fff",borderRadius:14,padding:32,width:360,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
            <div style={{fontSize:40,marginBottom:12}}>{clockConfirm==="in"?"🟢":"🔴"}</div>
            <div style={{fontWeight:700,fontSize:17,marginBottom:8}}>{clockConfirm==="in"?"Clock In":"Clock Out"}</div>
            <div style={{color:"#666",fontSize:13.5,marginBottom:20}}>{activeEmployee.name} · {now()}</div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <Btn label="Cancel" onClick={()=>setClockConfirm(null)} secondary/>
              <Btn label={clockConfirm==="in"?"✓ Confirm Clock In":"✓ Confirm Clock Out"} onClick={clockConfirm==="in"?clockIn:clockOut}/>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<DaycareApp />);
  </script>
</body>
</html>
